name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: cd runtime && npm ci
      - name: Type check
        run: cd runtime && npx tsc --noEmit

  check-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cargo check
        run: cd runtime/core && cargo check
      - name: Cargo test
        run: cd runtime/core && cargo test
