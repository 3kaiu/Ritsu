name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: runtime/package-lock.json

      - name: Install dependencies
        run: |
          cd runtime
          npm install

      - name: Version Consistency Check
        run: |
          cd runtime
          node version-check.js

      - name: Lint Check
        run: |
          cd runtime
          npm run lint

      - name: Type Check
        run: |
          cd runtime
          npx tsc --noEmit

      - name: Run Tests with Coverage
        run: |
          cd runtime
          npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: runtime/coverage
          fail_ci_if_error: false # Don't fail CI if codecov fails
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build Check
        run: |
          cd runtime
          npm run build

  release:
    name: Release
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: runtime/package-lock.json

      - name: Install dependencies
        run: |
          cd runtime
          npm install

      - name: Build
        run: |
          cd runtime
          npm run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd runtime
          npx semantic-release
