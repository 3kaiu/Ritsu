name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: cd runtime && npm ci
      - name: Version check
        run: cd runtime && npm run version:check
      - name: Type check
        run: cd runtime && npx tsc --noEmit
      - name: Unit tests
        run: cd runtime && npm test
