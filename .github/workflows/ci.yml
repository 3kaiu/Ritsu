name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version: [1.3]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: |
          cd runtime
          bun install

      - name: Version Consistency Check
        run: |
          cd runtime
          bun version-check.js

      - name: Lint Check
        run: |
          cd runtime
          bun run lint

      - name: Type Check
        run: |
          cd runtime
          bunx tsc --noEmit

      - name: Run Tests
        run: |
          cd runtime
          bun run test

      - name: Build Check
        run: |
          cd runtime
          bun run build

  build-native:
    name: Build native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: .so
            output: ritsu-native.linux-x64.node
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: .so
            output: ritsu-native.linux-arm64.node
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build native addon
        run: |
          cd runtime/native
          cargo build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/libritsu_native${{ matrix.ext }} ${{ matrix.output }}

      - name: Upload native addon
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: runtime/native/${{ matrix.output }}
          if-no-files-found: warn

  release:
    name: Release
    needs: [lint-and-test, build-native]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: Install dependencies
        run: |
          cd runtime
          bun install

      - name: Download native addons
        uses: actions/download-artifact@v4
        with:
          pattern: ritsu-native.*
          path: runtime/native/
          merge-multiple: true

      - name: Build
        run: |
          cd runtime
          bun run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd runtime
          bunx semantic-release
