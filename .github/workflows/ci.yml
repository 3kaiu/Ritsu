name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: Build, Lint & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Runtime Dependencies
        run: |
          cd runtime
          bun install --frozen-lockfile

      - name: TypeScript Compile & Type-Check
        run: |
          cd runtime
          bun run build
          bunx tsc --noEmit

      - name: Syntax & Lint Audit
        run: |
          cd runtime
          bun run lint

      - name: Run Quality Gate Vitest Suite
        run: |
          cd runtime
          bun run test

      - name: Ritsu Self-Doctor Diagnostic
        run: |
          bun runtime/dist/cli.js doctor
        env:
          RITSU_PROJECT_ROOT: ${{ github.workspace }}

      - name: Triple Trace Audit
        run: |
          bun runtime/dist/cli.js trace --check-triple || true
        env:
          RITSU_PROJECT_ROOT: ${{ github.workspace }}
