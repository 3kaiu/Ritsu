name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ritsud -> target

      - name: Build Rust Sidecar (Release)
        run: cargo build --manifest-path ritsud/Cargo.toml --release

      - name: Test Rust Sidecar
        run: cargo test --manifest-path ritsud/Cargo.toml

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            runtime/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('runtime/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: |
          cd runtime
          bun install --frozen-lockfile

      - name: TypeScript Build & Type-Check
        run: |
          cd runtime
          bun run build

      - name: Lint
        run: |
          cd runtime
          bun run lint

      - name: Test with Coverage
        run: |
          cd runtime
          bun run test 2>&1 | tee /tmp/test-output.txt

      - name: Check Test Results
        run: |
          FAILED=$(grep -oE '[0-9]+ failed' /tmp/test-output.txt | tail -1 | grep -oE '[0-9]+' || echo "0")
          if [ "$FAILED" -gt 0 ]; then
            echo "❌ $FAILED test failures"
            grep "^FAIL" /tmp/test-output.txt
            exit 1
          fi
          echo "✅ All tests passed successfully"

  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            runtime/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('runtime/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install & Build
        run: |
          cd runtime
          bun install --frozen-lockfile
          bun run build

      - name: Ritsu Doctor
        run: |
          bun runtime/dist/cli.js doctor
        env:
          RITSU_PROJECT_ROOT: ${{ github.workspace }}

      - name: Ritsu Doctor — Signals
        run: |
          bun runtime/dist/cli.js doctor --signals
        env:
          RITSU_PROJECT_ROOT: ${{ github.workspace }}
