name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version: [1.3]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: cd runtime && bun install

      - name: Lint Check
        run: cd runtime && bun run lint

      - name: Type Check
        run: cd runtime && bunx tsc --noEmit

      - name: Run Tests
        run: cd runtime && bun run test

      - name: Build Check
        run: cd runtime && bun run build

  build-native:
    name: Build native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: .so
            output: ritsu-native.linux-x64.node
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: .so
            output: ritsu-native.linux-arm64.node
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build native addon
        run: |
          cd runtime/native
          cargo build --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/libritsu_native${{ matrix.ext }} ${{ matrix.output }}
