name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Bun cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            runtime/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('runtime/bun.lockb') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: |
          cd runtime
          bun install --frozen-lockfile

      - name: TypeScript Build & Type-Check
        run: |
          cd runtime
          bun run build

      - name: Lint
        run: |
          cd runtime
          bun run lint

      - name: Test
        run: |
          cd runtime
          bun run test

  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore Bun cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            runtime/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('runtime/bun.lockb') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Ritsu Doctor
        run: |
          bun runtime/dist/cli.js doctor
        env:
          RITSU_PROJECT_ROOT: ${{ github.workspace }}

      - name: Ritsu Doctor — Signals
        run: |
          bun runtime/dist/cli.js doctor --signals
        env:
          RITSU_PROJECT_ROOT: ${{ github.workspace }}
