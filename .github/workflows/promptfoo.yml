name: Ritsu Promptfoo Regression

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  promptfoo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: runtime/package-lock.json

      - name: Install runtime dependencies
        run: cd runtime && npm ci

      - name: Build runtime
        run: cd runtime && npm run build

      - name: Install promptfoo
        run: npm install -g promptfoo@latest

      - name: Run policy & contract regressions
        run: cd runtime/promptfoo && promptfoo eval -c promptfooconfig.yaml
        env:
          RITSU_PROJECT_ROOT: ${{ github.workspace }}
