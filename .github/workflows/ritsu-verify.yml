name: Ritsu Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: Install dependencies
        run: cd runtime && bun install

      - name: Build
        run: cd runtime && bun run build

      - name: Doctor
        run: cd runtime && bun dist/cli.js doctor
        env:
          RITSU_PROJECT_ROOT: ${{ github.workspace }}

      - name: Triple Verification
        run: cd runtime && bun dist/cli.js trace --check-triple
        continue-on-error: true
        env:
          RITSU_PROJECT_ROOT: ${{ github.workspace }}
