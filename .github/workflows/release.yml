name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  verify-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: runtime/package-lock.json

      - name: Install dependencies
        run: |
          cd runtime
          npm install

      - name: Run Tests
        run: |
          cd runtime
          npm test

      - name: Build MCP Server
        run: |
          cd runtime
          npm run build

      - name: Package Artifact
        run: |
          tar -czf ritsu-v5.1.0-runtime.tar.gz runtime/dist runtime/package.json runtime/node_modules _shared

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ritsu-v5.1.0-runtime.tar.gz
          generate_release_notes: true
