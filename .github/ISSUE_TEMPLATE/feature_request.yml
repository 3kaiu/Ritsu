name: Feature Request
description: Suggest an enhancement for Ritsu
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should Ritsu solve it?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New skill
        - New detector
        - MCP tool
        - CLI
        - Integration
        - Other
