# Domain: Backend (后端) v3.4.0
# 继承 _base.yaml 全部内容。以下仅声明后端领域增量。

extends: _base

hypothesis_directions:
  - id: BE-H1
    name: 死锁 / 连接池耗尽 / OOM
  - id: BE-H2
    name: 事务隔离级别导致的不可重复读 / 幻读
  - id: BE-H3
    name: 非幂等写入导致的重复数据
  - id: BE-H4
    name: 上游微服务响应延迟 / 熔断触发

coding_disciplines:
  - id: BE-D1
    name: 事务边界
    rule: "所有的多表/多写操作必须包裹在事务中"
  - id: BE-D2
    name: 日志规范
    rule: "重要链路必须有 Trace/Info 日志，严禁吞异常不打日志。必须在 catch 块中先打日志再决定是否重抛"

attack_vectors:
  - id: BE-A1
    name: SQL 注入与越权
    check: "查询语句是否安全？接口是否只需知道 ID 就能绕过鉴权横向越权？"
  - id: BE-A2
    name: 竞态与死锁
    check: "高并发下这段事务是否会导致死锁？是否存在非原子的'先查后改'逻辑漏洞？"
  - id: BE-A3
    name: 数据迁移安全
    check: "破坏性 Schema 变更的迁移脚本是否可逆？是否有回滚测试？"

pr_requirements:
  - id: BE-PR1
    rule: "必须提供单测覆盖率报告或关键路径的 Benchmark 性能报告"
  - id: BE-PR2
    rule: "检查是否涉及破坏性 Schema 变更"

discipline_attack_mapping:
  - discipline: BE-D1
    attack: BE-A2
    relation: "事务是否原子？先查后改是否有漏洞？"
  - discipline: BE-D2
    attack: B-A1
    relation: "异常是否被吞导致无日志可查？"

optimize_disciplines:
  - id: BE-O1
    name: 查询优化
    rule: "识别 N+1 查询、缺失索引、全表扫描。EXPLAIN 验证优化前后执行计划差异"
  - id: BE-O2
    name: 连接池与缓存
    rule: "频繁创建的连接必须池化；重复计算的热数据必须缓存（Redis/内存），设置合理 TTL"
  - id: BE-O3
    name: 序列化优化
    rule: "JSON 序列化热点必须换用高性能库（如 sonic/fjson）；大对象必须做字段裁剪避免过度序列化"
  - id: BE-O4
    name: 并发模型优化
    rule: "串行可并行的 IO 必须改为并发（goroutine/asyncio/Promise.all）；锁粒度必须最小化"

optimize_tool_preferences:
  - category: 请求层
    libraries:
      - name: 连接池
        strengths: [sqlx/pgxpool/hikari]
    rule: "数据库连接必须使用连接池，禁止每次请求新建连接"
  - category: 缓存
    libraries:
      - name: Redis
        strengths: [热数据缓存, 会话存储, 分布式锁]
    rule: "读多写少的热点查询必须加 Redis 缓存层"

platform_optimizations: []
