# Domain: Fullstack (全栈) v6.5.0
# 继承基准配置。通过多态倾向性实现前后端技术栈的深度协同。

extends: _base

# ─── 组合倾向性感知 ──────────────────────────────────────────
stack_tendency:
  - id: FS-ST1
    name: React + Node.js (TS Fullstack)
    indicators: ["package.json", "src/backend", "src/frontend"]
    persona: "Senior Fullstack (React + Node.js) Architect"
  - id: FS-ST2
    name: React + Go (Modern Fullstack)
    indicators: ["package.json", "go.mod"]
    persona: "Senior Fullstack (React + Go) Architect"
  - id: FS-ST3
    name: Flutter + Node.js/Go (Mobile Fullstack)
    indicators: ["pubspec.yaml", "package.json", "go.mod"]
    persona: "Senior Fullstack (Flutter + Backend) Architect"

# ─── 全栈协同优化准则 ────────────────────────────────────────
optimize_disciplines:
  - id: FS-O1
    name: 契约驱动开发 (Contract-First)
    rule: "前后端边界必须通过 OpenAPI/TypeSafe-Schema 强制对齐。禁止手写重复的 DTO 定义，优先生成或共享类型"
  - id: FS-O2
    name: 端到端一致性
    rule: "关键业务流必须实现‘前端提交 -> 后端事务 -> 前端状态同步’的完整闭环。识别并消除状态不一致的中间态"
  - id: FS-O3
    name: 全链路可观测性
    rule: "必须实现从前端 Request Header 到后端日志的全链路 Trace-ID 透传，确保端到端请求可追踪"
  - id: FS-O4
    name: 端到端安全防御
    rule: "输入校验必须在端、网关、服务层三处对齐。敏感操作必须具备 CSRF 防护与 JWT 状态校验"

# ─── 跨层级专项优化 ──────────────────────────────────────────

# [数据交互层]
data_sync_optimizations:
  - rule: "响应报文精简：后端必须仅返回前端所需的字段。大列表接口强制要求分页与 gzip 压缩"
  - rule: "错误处理对齐：后端异常码必须映射为前端可理解的 UI 状态或全局错误提示"

# [认证与会话]
auth_optimizations:
  - rule: "身份令牌生命周期管理：实现无感刷新 (Silent Refresh) 机制，避免用户操作中断"
  - rule: "跨域与安全：生产环境严禁配置 Access-Control-Allow-Origin: *，必须指定明确域名"

# ─── 诊断与攻击向量 ──────────────────────────────────────────
attack_vectors:
  - id: FS-A1
    name: 契约漂移 (Contract Drift)
    check: "后端 API 变更是否会导致前端运行时崩溃？是否有自动化契约测试覆盖？"
  - id: FS-A2
    name: 状态机不一致
    check: "前端乐观更新失败时，是否有完善的 Rollback 逻辑确保 UI 回滚到后端真实状态？"
