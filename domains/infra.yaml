# Domain: Infra (运维与基础设施) v6.1.0
# 继承 _base.yaml 全部内容。支持多技术栈倾向性（Cloud-Native/IaC/CI-CD）。

extends: _base

# ─── 倾向性感知配置 ──────────────────────────────────────────
stack_tendency:
  - id: OP-ST1
    name: Cloud-Native
    indicators: ["charts/", "k8s/", "values.yaml"]
    persona: "Senior Cloud-Native & Kubernetes Architect"
  - id: OP-ST2
    name: IaC
    indicators: [".tf", "terragrunt.hcl", "ansible/"]
    persona: "Senior Infrastructure-as-Code Architect"
  - id: OP-ST3
    name: CI/CD
    indicators: [".github/", ".gitlab-ci.yml", "jenkinsfile"]
    persona: "Senior CI/CD & DevOps Architect"

# ─── 平台通用优化准则 ────────────────────────────────────────
optimize_disciplines:
  - id: OP-O1
    name: 幂等性与可回滚性
    rule: "所有的基础设施变更必须支持幂等执行。生产环境变更必须提供 release-advice（含回滚步骤与观察指标）"
  - id: OP-O2
    name: 最小权限与零信任
    rule: "严禁在脚本或配置中硬编码 Secret。CI/CD 必须优先使用 OIDC 身份认证。权限声明必须遵循 Least Privilege 原则"
  - id: OP-O3
    name: 资源治理 (FinOps)
    rule: "必须定义 Resource Requests/Limits。识别并清理闲置资源。识别并优化 CPU/Memory 预留与实际使用的偏差"

# ─── 技术栈专项优化 (倾向性驱动) ─────────────────────────────

# [云原生/K8s 专项]
k8s_optimizations:
  - rule: "必须配置 Liveness/Readiness 探针。识别并配置合理的 TerminationGracePeriod"
  - rule: "生产环境 Pod 必须配置多副本及 PodDisruptionBudget，确保高可用性"
  - rule: "识别 N+1 类型的 API 调用压力。敏感服务必须配置 NetworkPolicy 进行流量隔离"

# [IaC/Terraform 专项]
iac_optimizations:
  - rule: "模块化设计：重复资源必须抽取为内部 Module。变量必须有类型约束和默认值"
  - rule: "State 安全：禁止使用本地 State，必须使用远程后端（S3/Consul/GCS）并开启 State Lock"
  - rule: "版本锁定：Provider 和相关 Module 必须锁定版本，严禁使用通配符漂移"

# [CI/CD 专项]
cicd_optimizations:
  - rule: "流水线加速：充分利用 Docker Layer 缓存和依赖包缓存（如 actions/cache）。识别并并行化互不依赖的任务"
  - rule: "安全左移：流水线必须集成 SAST（静态分析）和 Secret 扫描步骤"
  - rule: "环境隔离：严禁在非生产流水线中直接访问生产环境 Credential"

# ─── 诊断与攻击向量 ──────────────────────────────────────────
attack_vectors:
  - id: OP-A1
    name: 配置漂移与不一致
    check: "实际云资源与 IaC 代码是否存在偏差？是否有手动修改痕迹？"
  - id: OP-A2
    name: 资源泄露与成本爆炸
    check: "是否存在未关联的磁盘、快照或未使用的 LB 导致持续计费？"
