# Domain: Infra (运维与基础设施) v3.8.0
# 继承 _base.yaml 全部内容。以下仅声明 infra 领域增量。

extends: _base

hypothesis_directions:
  - id: OP-H1
    name: 配置漂移 (Config Drift) / 环境不一致
  - id: OP-H2
    name: 资源配额耗尽 (CPU/Memory/Disk)
  - id: OP-H3
    name: 网络分区 / DNS 解析失败
  - id: OP-H4
    name: 密钥轮换未生效 / 证书过期

coding_disciplines:
  - id: OP-D1
    name: IaC 幂等性
    rule: "基础设施变更必须可重复执行不产生副作用"
  - id: OP-D2
    name: 最小权限
    rule: "ServiceAccount / IAM Role 必须遵循最小权限原则"
  - id: OP-D3
    name: 可观测性
    rule: "所有变更必须关联 Metrics / Alerts / Logs"

attack_vectors:
  - id: OP-A1
    name: 密钥泄露
    check: "Terraform/Ansible/Helm values 中是否硬编码了 Secret？"
  - id: OP-A2
    name: 破坏性变更
    check: "基础设施变更是否会导致服务中断？是否有蓝绿/金丝雀发布策略？"
  - id: OP-A3
    name: 发布建议缺失
    check: "若本次 infra 变更涉及灰度、切流、配额调整或复杂回滚窗口，是否已有 release-advice 明确发布步骤、观察项和回滚条件？"

pr_requirements:
  - id: OP-PR1
    rule: "必须提供 Plan 输出 (terraform plan / helm diff) 或变更影响范围说明"
  - id: OP-PR2
    rule: "检查是否修改了生产环境的配额或安全组"
  - id: OP-PR3
    rule: "生产发布若涉及切流、配额调整、证书轮换或复杂回滚窗口，必须在 assure 阶段补齐 release-advice"

optimize_disciplines:
  - id: OP-O1
    name: IaC 模板精简
    rule: "Terraform/Ansible/Helm 中的重复资源声明必须抽取为 module/role/helper；硬编码值必须变量化"
  - id: OP-O2
    name: 镜像/构建优化
    rule: "Dockerfile 必须多阶段构建；镜像必须使用 slim/alpine 基础镜像；.dockerignore 必须排除无关文件"
  - id: OP-O3
    name: CI/CD 流水线优化
    rule: "识别可并行的串行步骤；利用缓存层（node_modules/pip cache/Go module cache）；不必要的全量测试必须改为增量测试"

optimize_tool_preferences: []

platform_optimizations: []
