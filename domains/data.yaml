# Domain: Data / ML (数据与机器学习) v3.5.0
# 继承 _base.yaml 全部内容。以下仅声明数据领域增量。

extends: _base

hypothesis_directions:
  - id: DA-H1
    name: 数据倾斜 / 分布漂移 (Data Drift)
  - id: DA-H2
    name: 特征工程管线断裂 / Schema 不兼容
  - id: DA-H3
    name: 训练-推理不一致 (Training-Serving Skew)
  - id: DA-H4
    name: 资源竞争 (GPU 显存 / 磁盘 IO)

coding_disciplines:
  - id: DA-D1
    name: 数据管线幂等性
    rule: "ETL 步骤必须可重入，重复执行不产生脏数据"
  - id: DA-D2
    name: 实验可复现
    rule: "随机种子、超参数、数据版本必须锁定并记录"

attack_vectors:
  - id: DA-A1
    name: 数据泄露
    check: "训练集是否包含了测试集信息 (Label Leakage)？"
  - id: DA-A2
    name: 偏见与公平性
    check: "模型输出是否存在系统性偏见？"
  - id: DA-A3
    name: 隐私合规
    check: "数据集是否包含 PII？是否满足 GDPR/数据脱敏要求？"

pr_requirements:
  - id: DA-PR1
    rule: "必须提供数据管线端到端验证报告或模型指标对比表"
  - id: DA-PR2
    rule: "检查是否引入了新的数据依赖或变更了特征 Schema"

discipline_attack_mapping:
  - discipline: DA-D1
    attack: null
    relation: "重复执行 ETL 是否产生脏数据？"
  - discipline: DA-D2
    attack: null
    relation: "随机种子/超参数是否锁定？能否复现同一结果？"

optimize_disciplines:
  - id: DA-O1
    name: 数据管线优化
    rule: "ETL 串行步骤可并行的必须并行化；大表全量扫描必须改为增量抽取；中间结果必须缓存避免重复计算"
  - id: DA-O2
    name: 训练推理优化
    rule: "模型推理热点必须量化（INT8/FP16）；批处理必须替代单条推理；ONNX/TensorRT 加速可评估时必须采用"
  - id: DA-O3
    name: 特征工程精简
    rule: "低重要性特征必须剔除（基于 feature importance / correlation）；特征计算重复逻辑必须合并为共享 UDF"

optimize_tool_preferences: []

platform_optimizations: []
