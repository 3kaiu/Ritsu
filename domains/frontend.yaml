# Domain: Frontend (前端) v3.5.0
# 继承 _base.yaml 全部内容。以下仅声明前端领域增量。

extends: _base

hypothesis_directions:
  - id: FE-H1
    name: 缓存过期 / Service Worker 拦截
  - id: FE-H2
    name: 闭包引起的旧值 (Stale Closure)
  - id: FE-H3
    name: 竞态条件 (Race Condition in State)
  - id: FE-H4
    name: 三方库版本冲突 / Peer Dependency 缺失
  - id: FE-H5
    name: Hydration 冲突 (SSR 场景)
  - id: FE-H6
    name: CORS 拦截 / 资源加载 404

coding_disciplines:
  - id: FE-D1
    name: Re-render 检查
    rule: "状态变更粒度是否最小化？严禁滥用全局状态。必须将可共享状态隔离至最近公共祖先组件"
  - id: FE-D2
    name: 竞态条件
    rule: "异步网络请求必须做取消 (AbortController) 或防抖处理"
  - id: FE-D3
    name: 内存泄漏
    rule: "绑定的全局事件或定时器必须在组件销毁时解绑"

attack_vectors:
  - id: FE-A1
    name: XSS 与数据注入
    check: "用户输入是否直接渲染在 DOM 中？"
  - id: FE-A2
    name: 状态篡改
    check: "前端状态管理是否容易被直接从 Console 或插件中篡改并绕过业务校验？"
  - id: FE-A3
    name: 性能与渲染
    check: "是否存在不必要的大面积重渲染？大列表是否做了虚拟化？"
  - id: FE-A4
    name: 跨域信任
    check: "后端 API 返回值是否被前端无条件信任并渲染？"

pr_requirements:
  - id: FE-PR1
    rule: "必须提供 UI 变更截图或录屏"
  - id: FE-PR2
    rule: "检查是否增加了不必要的大体积三方包（>50KB 需说明）"

discipline_attack_mapping:
  - discipline: FE-D1
    attack: FE-A3
    relation: "大面积重渲染？"
  - discipline: FE-D2
    attack: FE-H3
    relation: "请求取消是否生效？"
  - discipline: FE-D3
    attack: null
    relation: "全局事件/定时器是否仍在运行？"

optimize_disciplines:
  - id: FE-O1
    name: 工具库优先替换
    rule: "手写的 useState+useEffect 组合必须优先替换为 react-use / ahooks 对应工具函数。react-use 擅长：useDebounce/useThrottle/useLocalStorage/useToggle。ahooks 擅长：useDebounceFn/useThrottleFn/useMemoizedFn/useDeepCompareEffect/useSize/useClickAway/useUpdateEffect"
  - id: FE-O2
    name: 请求层精简
    rule: "手写的 fetch/axios + useState + useEffect + loading/error 状态管理必须替换为 TanStack Query（useQuery/useMutation/useInfiniteQuery），自动获得缓存/重试/去重/失效刷新"
  - id: FE-O3
    name: 样式迁移 TailwindCSS
    rule: "内联 style 对象和独立 CSS 文件中的规则必须迁移为 TailwindCSS 等价类。重复样式块合并为 @apply 抽象。CSS Modules 保留仅在需要动态类名时"
  - id: FE-O4
    name: 语义化标签
    rule: "div/span 必须替换为语义标签：header/main/section/nav/article/aside/footer/time/mark。仅当语义标签不适用时保留 div"
  - id: FE-O5
    name: 渲染性能
    rule: "大列表必须虚拟化（react-window/react-virtuoso）；重渲染热点必须 React.memo/useMemo/useCallback 包裹；context 值必须 memo 化避免全树重渲染"

optimize_tool_preferences:
  - category: 状态/副作用
    libraries:
      - name: react-use
        strengths:
          [
            useDebounce,
            useThrottle,
            useLocalStorage,
            useToggle,
            useCopyToClipboard,
            useMedia,
          ]
      - name: ahooks
        strengths:
          [
            useRequest,
            useDebounceFn,
            useThrottleFn,
            useMemoizedFn,
            useDeepCompareEffect,
            useSize,
            useClickAway,
            useUpdateEffect,
          ]
    rule: "react-use 擅长简单原子 hook，ahooks 擅长复杂业务 hook。优先 react-use 的 useDebounce/useThrottle 替代手写防抖节流；请求层替换见下方请求层分类"
  - category: 请求层
    libraries:
      - name: "@tanstack/react-query"
        strengths: [useQuery, useMutation, useInfiniteQuery, useSuspenseQuery]
    rule: "所有手写的 fetch+useState+useEffect+loading/error 模式必须替换为 TanStack Query"

platform_optimizations:
  - id: FE-P1
    name: WebView 预加载
    rule: "H5 内嵌原生 App 时，利用 WebView 预加载（prefetch DNS/预连接）：<link rel='dns-prefetch' href='//api.example.com'> <link rel='preconnect' href='//api.example.com'>"
  - id: FE-P2
    name: WebView 缓存策略
    rule: "静态资源设置强缓存（Cache-Control: max-age=31536000），HTML 入口设置协商缓存，利用 WebView 的缓存机制减少重复请求"
  - id: FE-P3
    name: WebView 滚动优化
    rule: "长列表滚动区域添加 -webkit-overflow-scrolling: touch 和 overflow-scroll-behavior: contain，启用 GPU 加速滚动"
  - id: FE-P4
    name: WebView 首屏加速
    rule: "首屏关键 CSS 内联，非关键资源 defer/async 加载，图片使用 loading='lazy' + 考虑 WebP 格式，骨架屏替代 loading 动画"
  - id: FE-P5
    name: JSBridge 调用优化
    rule: "原生 JSBridge 调用必须做超时兜底（3s），避免 WebView 卡死；频繁调用的 Bridge 必须做节流"
