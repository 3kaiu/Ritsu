# Domain: Frontend (前端) v5.6.0
# 继承 _base.yaml 全部内容。支持多平台倾向性（React/Flutter/Mobile）。

extends: _base

# ─── 倾向性感知配置 ──────────────────────────────────────────
stack_tendency:
  - id: FE-ST1
    name: Web-React
    indicators: ["package.json", "react", "react-dom"]
    persona: "Senior React Architect"
  - id: FE-ST2
    name: Mobile-Flutter
    indicators: ["pubspec.yaml", "flutter"]
    persona: "Senior Flutter Architect"

# ─── 平台通用优化准则 ────────────────────────────────────────
optimize_disciplines:
  - id: FE-O1
    name: 语义化与结构化
    rule: "Web 必须使用 HTML5 语义标签；Flutter 必须使用语义化的 Widget 结构 (Semantics)。优先保证可访问性"
  - id: FE-O2
    name: 渲染性能基准
    rule: "识别并消除冗余构建/重渲染。Web 使用 React.memo/useMemo；Flutter 使用 const constructors/RepaintBoundary"
  - id: FE-O3
    name: 异步竞态管理
    rule: "所有异步操作（API/IO）必须具备取消机制或竞态消除。Web 使用 TanStack Query；Flutter 使用 Bloc/Riverpod 状态隔离或 CancelableOperation"
  - id: FE-O4
    name: 代码清理与 TSDoc
    rule: "移除 Dead Code 与冗余注释。必须保留核心 TSDoc/DartDoc。保持项目原有布局，严禁过度重构"

# ─── 平台专项优化 (倾向性驱动) ─────────────────────────────

# [React 专项]
react_optimizations:
  - rule: "优先混合使用 react-use (传感器/浏览器) 与 ahooks (逻辑/控制流)"
  - rule: "强制迁移至 TailwindCSS 样式系统，移除内联 style"
  - rule: "所有 API 交互必须收拢至 TanStack Query"

# [Flutter 专项]
flutter_optimizations:
  - rule: "优先使用 const 构造函数减少 Widget 树重建开销"
  - rule: "大列表必须使用 ListView.builder 或 CustomScrollView 虚拟化"
  - rule: "状态管理必须遵循项目既有方案（Provider/Riverpod/Bloc），严禁引入冲突的第三方状态库"
  - rule: "资源路径 (assets) 必须在 pubspec.yaml 中对齐，移除未使用的资源文件"

# ─── 诊断与攻击向量 ──────────────────────────────────────────
attack_vectors:
  - id: FE-A1
    name: 状态篡改与跨域攻击
    check: "前端状态是否可被非预期篡改？Web 环境下是否存在 XSS 或 CSRF 风险？"
  - id: FE-A2
    name: 性能退化
    check: "是否存在内存泄漏（如未释放的 Timer/Controller/EventStream）？"

platform_optimizations:
  - id: FE-P1
    name: WebView 加速与缓存
    rule: "启用 DNS 预解析与预连接：<link rel='dns-prefetch' href='//api.com'> <link rel='preconnect' href='//api.com'>。静态资源设置长期强缓存 (1年)，HTML 使用协商缓存"
  - id: FE-P2
    name: GPU 与滚动性能
    rule: "长列表滚动区域必须添加 -webkit-overflow-scrolling: touch；关键区域使用 will-change: transform 开启 GPU 加速"
  - id: FE-P3
    name: JSBridge 安全与健壮性
    rule: "所有的原生 Bridge 调用必须封装超时处理 (默认 3s)；针对传感器、滚动等高频调用必须在前端进行节流 (Throttle)"
  - id: FE-P4
    name: 首屏体验优化
    rule: "首屏关键 CSS 内联，非关键 JS 使用 defer 加载。必须配置骨架屏 (Skeleton Screen) 以替代传统的 Loading 动画"
  - id: FE-P5
    name: 移动端资源策略
    rule: "图片优先使用 WebP 格式并提供加载失败的回退方案。非首屏图片必须配置 loading='lazy'"
