# Ritsu 全局状态机 v3.8.0
# 优先表达产品阶段流转，而不是让用户承受过细的 skill 心智负担。

states:
  intake:
    owned_by: route
    next:
      [deliver.quick, deliver.standard, deliver.critical, assure, extensions]
    rules:
      - "intake 的职责是形成执行单，而不是直接展开全部实现细节"
      - "若信息严重缺失，应先补信息，再进入 deliver"

  deliver.quick:
    owned_by: pipe
    next: [assure, deliver.standard]
    rules:
      - "适用于小改动、低风险、信息充分的任务"
      - "可降低交互成本，但不得跳过最小必要验证"
      - "若实现中发现风险被低估，应升级到 deliver.standard"

  deliver.standard:
    owned_by: pipe
    next: [assure, deliver.critical, intake]
    rules:
      - "默认交付路径"
      - "允许内部调用 think/dev/test/hunt"
      - "若需求边界失真或验证持续失败，可回到 intake 或升级到 critical"

  deliver.critical:
    owned_by: pipe
    next: [assure, intake]
    rules:
      - "适用于架构改动、数据迁移、高发布风险任务"
      - "必须补充边界、关键验证和回滚方案"
      - "若前提条件仍不充分，可退回 intake 重新定义执行单"

  assure:
    owned_by: review
    next: [deliver.quick, deliver.standard, deliver.critical, extensions]
    rules:
      - "assure 负责给出可合并、可上线、阻断项和剩余风险"
      - "命中阻断项后必须退回 deliver，而不是直接宣称完成"
      - "PASS 不等于必须部署；是否进入 extensions.deploy 取决于上下文"

  extensions:
    owned_by: init/document/deploy/triage
    next: [intake, deliver.quick, deliver.standard, assure]
    rules:
      - "扩展能力不属于主链路一线入口"
      - "文档、部署、工单处理等动作应在主交付链路之外明确说明目的"

skill_mapping:
  route: intake
  pipe: deliver.standard
  review: assure
  think: deliver.standard
  dev: deliver.standard
  test: deliver.standard
  hunt: deliver.standard
  optimize: deliver.standard
  refactor: deliver.standard
  init: extensions
  document: extensions
  deploy: extensions
  triage: extensions
  read: intake

mode_hints:
  quick:
    triggers:
      - "微小改动"
      - "低风险"
      - "上下文充分"
  standard:
    triggers:
      - "默认模式"
      - "常规需求"
      - "常规 bugfix"
  critical:
    triggers:
      - "架构改动"
      - "数据迁移"
      - "上线风险高"

circuit_breaker:
  - stage: assure
    condition: "连续两次 FAIL"
    action: route_to_intake
  - stage: deliver.standard
    condition: "同一目标在 deliver→assure 循环超过 3 次"
    action: escalate_to_critical
  - stage: deliver.quick
    condition: "发现超出 quick 边界的架构/契约风险"
    action: escalate_to_standard
