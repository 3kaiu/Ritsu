# Ritsu 全局状态机 v3.5.0
# 定义技能间的合法流转路径、熔断规则与标准引导话术。
# AI 执行流转判定时，必须查询此文件的 states.{current}.next 确认合法性。
# transitions 定义触发流转的事件和 UI 渲染提示，供前端消费。

states:
  route:
    next: [init, think, dev, hunt, review, optimize, triage]
    transitions:
      - to: init
        event: no_agents_md
        ui_hint: show_init_prompt
      - to: think
        event: feature_request
        ui_hint: show_think_entry
      - to: dev
        event: implementation_request
        ui_hint: show_dev_entry
      - to: hunt
        event: bug_report
        ui_hint: show_hunt_entry
      - to: review
        event: review_request
        ui_hint: show_review_entry
      - to: optimize
        event: optimization_request
        ui_hint: show_optimize_entry
      - to: triage
        event: issue_triage
        ui_hint: show_triage_entry
  init:
    next: [route, think]
    transitions:
      - to: route
        event: init_complete_undecided
        ui_hint: show_route_options
      - to: think
        event: init_complete_with_feature
        ui_hint: show_think_entry
    hint:
      route: "不确定下一步"
      think: "新需求"
  think:
    next: [dev, think]
    note: "循环允许（方案被否决时重新设计）"
    transitions:
      - to: dev
        event: handoff_written
        ui_hint: show_handoff_preview
      - to: think
        event: design_rejected
        ui_hint: highlight_rejected_items
  dev:
    next: [review, optimize]
    transitions:
      - to: review
        event: dev_complete
        ui_hint: show_dev_summary
      - to: optimize
        event: dev_complete_needs_optimization
        ui_hint: show_optimize_suggestion
    branches:
      review: "开发完成，需审查"
      optimize: "代码可用但需精简/提速"
  review:
    next: [dev, think, optimize, triage]
    transitions:
      - to: dev
        event: review_fail
        ui_hint: show_review_fail_items
      - to: think
        event: circuit_breaker_triggered
        ui_hint: show_circuit_breaker_alert
      - to: optimize
        event: review_pass_with_optimization
        ui_hint: show_optimize_opportunity
      - to: triage
        event: review_pass_with_issues
        ui_hint: show_triage_suggestion
    branches:
      dev: "单次 FAIL，必须修复"
      think: "连续两次 FAIL 触发熔断，重审架构"
      optimize: "PASS 但有性能/精简空间"
      triage: "PASS + 有工单待处理（可选）"
  optimize:
    next: [review]
    note: "优化后必须审查确认无功能回归"
    transitions:
      - to: review
        event: optimize_complete
        ui_hint: show_optimize_summary
  hunt:
    next: [dev, think]
    transitions:
      - to: dev
        event: simple_fix_identified
        ui_hint: show_diagnosis_summary
      - to: think
        event: architectural_fix_needed
        ui_hint: show_architectural_alert
    branches:
      dev: "简单修复"
      think: "架构级修复"
  triage:
    next: [hunt, think, review, optimize]
    transitions:
      - to: hunt
        event: bug_issue
        ui_hint: show_bug_issue_context
      - to: think
        event: feature_issue
        ui_hint: show_feature_issue_context
      - to: review
        event: pr_issue
        ui_hint: show_pr_diff_preview
      - to: optimize
        event: performance_issue
        ui_hint: show_performance_metrics
    branches:
      hunt: "Bug 工单"
      think: "Feature 工单"
      review: "PR 工单"
      optimize: "性能优化工单"

circuit_breaker:
  - skill: review
    condition: "连续两次 FAIL"
    action: route_to_think
    message: "⚠️ 熔断触发（连续两次 FAIL）→ 必须引导至 /r-think 重新审视架构设计，或要求人类介入"
  - skill: dev→review
    condition: "同一 handoff 的 dev→review 循环超过 3 次"
    action: route_to_think
    message: "⚠️ 循环熔断（dev↔review 循环 >3 次）→ 反复修补说明设计有缺陷，必须引导至 /r-think 重新审视"
  - skill: optimize→review
    condition: "同一模块的 optimize→review 循环超过 2 次"
    action: route_to_think
    message: "⚠️ 循环熔断（optimize↔review 循环 >2 次）→ 优化引入回归说明理解不充分，必须引导至 /r-think 重新审视"

guidance:
  route_done:
    icon: "🧭"
    template: "律 (Ritsu) 调度决策：已识别意图，领域已解析。请执行：/r-{skill}"
  init_done:
    icon: "✅"
    template: "律 (Ritsu) 初始化完毕，AGENTS.md 已生效。"
    options:
      - "不确定下一步 → /r-route"
      - "构思新特性 → /r-think [特性描述]"
      - "直接开发 → /r-dev [需求描述]"
  think_done:
    icon: "✅"
    template: "律 (Ritsu) Handoff 已写入 .ritsu/handoff-{slug}.md。"
    options:
      - "确认方案后 → /r-dev [执行此 Handoff: .ritsu/handoff-{slug}.md]"
      - "方案需修改 → /r-think [修改意见]（循环允许）"
  dev_done:
    icon: "✅"
    template: "律 (Ritsu) 编码与自测落盘完毕。"
    options:
      - "进入防腐阶段 → /r-review"
  review_pass:
    icon: "✅"
    template: "律 (Ritsu) 对抗审查通过，Review Stamp 已写入 .ritsu/review-stamp-{ts}.md。"
    options:
      - "有工单待处理 → /r-triage（可选）"
      - "无工单 → 可直接合并"
  review_fail:
    icon: "❌"
    template: "律 (Ritsu) 拦截成功，Review Stamp 已写入 .ritsu/review-stamp-{ts}.md。"
    options:
      - "单次失败，携带 Stamp 修复 → /r-dev [修复 review-stamp-{ts}.md 中的问题]"
      - "⚠️ 熔断触发（连续两次 FAIL）→ /r-think [架构或逻辑存在严重偏差，申请重构 Handoff]"
  hunt_done:
    icon: "✅"
    template: "律 (Ritsu) 根因已锁定，诊断报告已写入 .ritsu/diagnosis-{ts}.md。"
    options:
      - "简单修复 → /r-dev [依据 diagnosis-{ts}.md 修复]"
      - "架构级修复 → /r-think [设计修复方案]"
  optimize_done:
    icon: "✅"
    template: "律 (Ritsu) 优化完毕，报告已写入 .ritsu/optimize-report-{ts}.md。"
    options:
      - "进入审查确认无回归 → /r-review"
      - "继续优化其他模块 → /r-opt [目标文件/模块]"
  triage_done:
    icon: "✅"
    template: "律 (Ritsu) 工单裁决完毕。"
    options:
      - "Bug 工单 → /r-hunt [摘要: {一句话描述} | 复现: {步骤} | 环境: {信息}]"
      - "Feature 工单 → /r-think [特性描述]"
      - "PR 工单 → /r-review"
