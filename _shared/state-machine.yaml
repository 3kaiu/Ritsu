# Ritsu 全局状态机 v3.8.0
# 优先表达显式 skill 工作流，而不是隐藏式编排阶段。

states:
  think:
    owned_by: think
    next: [dev, review, extensions]
    rules:
      - "think 负责需求审核、范围澄清、风险判断与契约确认"
      - "当信息严重缺失时，应先补信息，而不是直接进入实现"
      - "若边界已清晰，可直接把实施清单交给 dev"

  dev:
    owned_by: dev
    next: [test, hunt, review, think]
    rules:
      - "dev 是实现主入口，不得擅自扩大 think 已确认的范围"
      - "实现中若发现边界失真、依赖冲突或方案假设被推翻，应回到 think"
      - "实现完成后，应进入 test 或 review；验证失败时可转入 hunt"

  test:
    owned_by: test
    next: [review, dev, hunt, think]
    rules:
      - "test 负责补测、执行验证与确认质量门禁"
      - "若失败原因明确，可回到 dev；若失败原因不明，可转入 hunt"
      - "若测试暴露需求边界错误，应回到 think"

  hunt:
    owned_by: hunt
    next: [dev, think, test, review]
    rules:
      - "hunt 负责取证、假设验证与根因定位"
      - "确诊后应明确回到 dev 修复，或回到 think 重设边界"
      - "hunt 的目标是恢复交付，不是替代开发或验收"

  review:
    owned_by: review
    next: [dev, test, hunt, think, extensions]
    rules:
      - "review 负责通过 assurance-sheet 输出最终验收结论与发布建议"
      - "命中阻断项后必须显式退回 dev / test / think，不得模糊宣称完成"
      - "PASS 不等于必须部署；是否进入 deploy 取决于上下文"

  extensions:
    owned_by: init/read/deploy/document/triage/optimize/refactor
    next: [think, dev, test, hunt, review]
    rules:
      - "扩展能力不替代默认交付链路"
      - "专项模式和辅助动作应明确说明与默认交付链路的关系"

skill_mapping:
  think: think
  dev: dev
  test: test
  hunt: hunt
  review: review
  optimize: dev
  refactor: dev
  init: extensions
  read: extensions
  deploy: extensions
  document: extensions
  triage: extensions

mode_hints:
  quick:
    triggers:
      - "微小改动"
      - "低风险"
      - "上下文充分"
  standard:
    triggers:
      - "默认模式"
      - "常规需求"
      - "常规 bugfix"
  critical:
    triggers:
      - "架构改动"
      - "数据迁移"
      - "上线风险高"

circuit_breaker:
  - stage: review
    condition: "连续两次 FAIL"
    action: return_to_think
  - stage: dev
    condition: "同一目标在 dev→test→review 循环超过 3 次"
    action: escalate_scope_review
  - stage: test
    condition: "验证持续失败且根因不明"
    action: route_to_hunt

flow_runtime:
  registry:
    manifests_dir: "_shared/flows/"
    schema_ref: "_shared/flow-schema.yaml"
  state:
    dir: ".ritsu/flows/"
    record:
      - run_id
      - flow_id
      - phase
      - current_step
      - completed_steps
      - verification_status
      - artifact_outputs
      - recovery_point
  execution_rule:
    deterministic_first: true
    ai_decision_pauses_by_default: true
    failure_must_persist_recovery_point: true
