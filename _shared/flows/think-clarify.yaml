flow_id: think-clarify
phase: think
intent: requirement_clarification
required_inputs:
  - user_goal
prechecks:
  - step_id: load_ctx
    title: Restore recent delivery context
    executor_type: tool
    action: read_ctx
    success_condition: "ctx snapshot loaded or empty state confirmed"
    on_failure: "record recovery point and continue with an explicit fresh-session warning"
  - step_id: load_agents
    title: Read project rules baseline
    executor_type: tool
    action: read_agents
    optional: true
    success_condition: "AGENTS.md parsed or skipped as optional"
    on_failure: "continue with workspace heuristics and mark assumptions"
  - step_id: env_probe
    title: Check writable workspace and git reality
    executor_type: tool
    action: env_probe
    optional: true
    success_condition: ".ritsu and git reality checked"
    on_failure: "continue only if the task is analysis-only; otherwise stop for environment repair"
steps:
  - step_id: confirm_goal
    title: Confirm target, scope, and risks
    executor_type: ai_decision
    required_context:
      - user_goal
      - ctx_summary
    decision_contract:
      required_decision_keys:
        - goal
        - scope
        - risk
    success_condition: "goal, scope, and non-goals are explicit"
    on_failure: "write recovery point and ask for boundary clarification"
  - step_id: draft_think_artifacts
    title: Draft think-ticket and optional think-plan
    executor_type: ai_decision
    required_context:
      - clarified_goal
      - risk_assessment
    decision_contract:
      required_decision_keys:
        - contract_ready
      required_artifacts:
        - think-ticket
      artifact_expectations:
        - type: think-ticket
          required_contains:
            - "推荐路径: 先进入 dev"
        - type: think-plan
          required_contains:
            - "验证计划: list_artifacts 校验主产物存在"
    writes_artifact:
      - think-ticket
      - think-plan
    success_condition: "delivery contract is explicit enough for dev"
    on_failure: "return to clarification and narrow the task"
verifications:
  - step_id: verify_think_artifact_inventory
    title: Verify primary planning artifacts exist
    executor_type: tool
    action: list_artifacts
    action_params:
      type: think-ticket
    success_condition: "at least one think-ticket is available for the current task family"
    on_failure: "mark planning artifact gap and hold before dev"
artifacts:
  - think-ticket
  - think-plan
failure_recovery:
  - persist recovery_point=current_step
  - preserve ctx snapshot and flow state
  - recommend returning to think with narrowed scope
next_phase_rules:
  - when: "scope is explicit and implementation contract is ready"
    next_phase: dev
  - when: "risks are blocking or evidence is contradictory"
    next_phase: hunt
  - when: "task is analysis-only"
    next_phase: review
