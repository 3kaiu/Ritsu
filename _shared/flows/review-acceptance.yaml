flow_id: review-acceptance
phase: review
intent: final_acceptance
required_inputs:
  - delivery_scope
prechecks:
  - step_id: load_ctx
    title: Restore delivery context
    executor_type: tool
    action: read_ctx
    success_condition: "ctx snapshot loaded"
    on_failure: "record recovery point and continue with explicit fresh-session warning"
  - step_id: collect_primary_artifacts
    title: Load primary artifact inventory
    executor_type: tool
    action: list_artifacts
    success_condition: "artifact inventory loaded"
    on_failure: "hold review until delivery evidence is on disk"
  - step_id: collect_changed_files
    title: Inspect changed files for review framing
    executor_type: tool
    action: get_changed_files
    optional: true
    success_condition: "changed files snapshot collected or skipped"
    on_failure: "continue with artifact-only framing"
steps:
  - step_id: run_quality_gates
    title: Re-run quality gates when review needs fresh evidence
    executor_type: tool
    action: run_quality_gates
    success_condition: "review gate evidence is available"
    on_failure: "route back to dev or hunt with failure evidence preserved"
  - step_id: issue_review_conclusion
    title: Produce review-report and optional review-advice
    executor_type: ai_decision
    required_context:
      - primary_artifacts
      - quality_gates
      - changed_files
    decision_contract:
      required_decision_keys:
        - acceptance_decision
        - blockers
        - next_action
      required_artifacts:
        - review-report
    writes_artifact:
      - review-report
      - review-advice
    success_condition: "acceptance decision, blockers, and next action are explicit"
    on_failure: "hold completion and preserve evidence summary"
verifications:
  - step_id: verify_review_inventory
    title: Verify review-report inventory
    executor_type: tool
    action: list_artifacts
    action_params:
      type: review-report
    success_condition: "review-report exists"
    on_failure: "hold before closing the flow"
artifacts:
  - review-report
  - review-advice
failure_recovery:
  - persist recovery_point=current_step
  - preserve gate results and primary artifact inventory
  - recommend explicit redirect instead of ambiguous completion
next_phase_rules:
  - when: "review passes with no blockers"
    next_phase: extensions
  - when: "review blockers require code changes"
    next_phase: dev
  - when: "review blockers indicate unclear failures"
    next_phase: hunt
  - when: "review blockers indicate scope mismatch"
    next_phase: think
