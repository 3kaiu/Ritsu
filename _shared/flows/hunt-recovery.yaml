flow_id: hunt-recovery
phase: hunt
intent: diagnosis_and_recovery
required_inputs:
  - failure_signal
prechecks:
  - step_id: load_ctx
    title: Restore delivery context
    executor_type: tool
    action: read_ctx
    success_condition: "ctx snapshot loaded"
    on_failure: "record recovery point and continue with explicit fresh-session warning"
  - step_id: collect_diff
    title: Inspect current diff
    executor_type: tool
    action: get_diff
    optional: true
    success_condition: "diff summary collected or skipped"
    on_failure: "continue with evidence already on disk"
  - step_id: collect_artifacts
    title: Load existing artifacts
    executor_type: tool
    action: list_artifacts
    success_condition: "artifact inventory loaded"
    on_failure: "continue with narrower evidence set"
steps:
  - step_id: collect_evidence
    title: Synthesize evidence and root-cause hypotheses
    executor_type: ai_decision
    required_context:
      - failure_signal
      - artifacts
      - diff
    decision_contract:
      required_decision_keys:
        - root_cause
        - evidence_chain
        - confidence
    success_condition: "root cause hypothesis is evidence-backed"
    on_failure: "hold and gather more evidence"
  - step_id: write_diagnosis
    title: Produce diagnosis artifact when needed
    executor_type: ai_decision
    required_context:
      - root_cause
      - evidence_chain
    decision_contract:
      required_decision_keys:
        - diagnosis_ready
        - recommended_redirect
      required_artifacts:
        - diagnosis
    writes_artifact:
      - diagnosis
    success_condition: "diagnosis is actionable for dev or think"
    on_failure: "hold before redirect"
verifications:
  - step_id: verify_diagnosis_inventory
    title: Verify diagnosis inventory
    executor_type: tool
    action: list_artifacts
    action_params:
      type: diagnosis
    optional: true
    success_condition: "diagnosis exists or hunt explicitly concluded no artifact is needed"
    on_failure: "hold before redirect"
artifacts:
  - diagnosis
failure_recovery:
  - persist recovery_point=current_step
  - preserve evidence summary and last failing signal
  - recommend dev or think based on diagnosis confidence
next_phase_rules:
  - when: "root cause is implementation-local"
    next_phase: dev
  - when: "root cause is requirement or boundary mismatch"
    next_phase: think
  - when: "more validation is required after a fix"
    next_phase: test
