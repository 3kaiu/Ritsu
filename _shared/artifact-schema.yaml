# Ritsu 产物契约 v4.1.0
# 定义所有跨技能中间产物的强制格式。
# 下游技能读取上游产物时，必须按此 Schema 解析，禁止自由解读。
# ritsu_write_artifact 工具在写入时会校验此 Schema，发现占位符自动拒绝写入。

schemas:
  design_sheet:
    id: 10
    path: ".ritsu/design-sheet-{YYYYMMDD-HHMMSS}.md"
    required_sections:
      - title: "1. 任务识别 (Intake)"
        fields:
          - name: task_type
            label: "任务类型"
          - name: current_goal
            label: "当前目标"
          - name: risk_level
            label: "风险等级"
      - title: "2. 方案与边界 (Plan)"
        fields:
          - name: delivery_goal
            label: "交付目标"
          - name: in_scope
            label: "纳入范围"
          - name: out_of_scope
            label: "不纳入范围"
      - title: "3. 技术契约 (Contract)"
        description: "核心改动文件、API 定义、组件 Props 变动等硬契约"
        conditional_fields:
          - domains: [backend, fullstack]
            fields:
              - name: api_contract
                label: "API / 接口契约"
                sub_fields: [method_path, request_schema, response_schema]
              - name: data_model
                label: "数据模型"
                sub_fields: [table_name, key_fields]
          - domains: [frontend, fullstack]
            fields:
              - name: component_contract
                label: "组件契约"
                sub_fields: [component_name, props_type, emits_callbacks]
      - title: "4. 代价与风险 (Metrics & Risks)"
        fields:
          - name: complexity_score
            label: "复杂度评分 (1-10)"
          - name: intrusion
            label: "架构侵入度 (1-10)"
          - name: rollback_steps
            label: "回滚步骤"
            rule: "上线发现致命 Bug 的确切回滚指令"
      - title: "5. 实施清单 (Execution)"
        type: checklist
        item_format: "- [ ] `{文件路径}`: {主干逻辑描述}"
        fields:
          - name: verification_plan
            label: "验证计划"

  assurance_sheet:
    id: 12
    path: ".ritsu/assurance-sheet-{YYYYMMDD-HHMMSS}.md"
    required_sections:
      - title: "1. 验收结论 (Verdict)"
        fields:
          - name: mergeability
            label: "合并结论"
          - name: deployability
            label: "上线结论"
      - title: "2. 风险与阻断 (Risks)"
      - title: "3. 发布与协作 (Advice)"
        fields:
          - name: release_advice
            label: "上线建议"
          - name: business_impact
            label: "业务影响"
      - title: "4. 失败回流 (Rejection Feedback)"
        fields:
          - name: rejection_summary
            label: "拒绝原因摘要"
          - name: required_fixes
            label: "强制修复项"
            type: list

  delivery_report:
    id: 11
    path: ".ritsu/dev-report-{YYYYMMDD-HHMMSS}.md"
    required_sections:
      - title: "交付摘要"
        fields:
          - name: implementation_result
            label: "实施结果"
          - name: verification_result
            label: "验证结果"
      - title: "变更明细"

  agents_md:
    id: 0
    path: "{项目根}/AGENTS.md"
    placeholder_allowed: true
    required_fields:
      - field: ritsu-version
        type: string
        pattern: "4.1.x"
      - field: domain
        type: enum
        values: [frontend, backend, fullstack, infra, data]

  diagnosis:
    id: 2
    md_path: ".ritsu/diagnosis-{YYYYMMDD-HHMMSS}.md"
    required_sections:
      - title: "根因确诊"
        fields:
          - name: root_cause
      - title: "证据链"
        type: table
        columns: [序号, 证据, 来源]
      - title: "复现步骤"
        fields:
          - name: steps
            type: ordered_list

  # [DEPRECATED] Handoff v4.1 以后已并入 Design Sheet，仅保留空壳兼容旧逻辑
  handoff:
    id: 1
    path: ".ritsu/handoff-legacy-{slug}.md"
    required_sections:
      - title: "已迁移"
        fields:
          - name: migration_note
            label: "迁移说明"
            default: "已并入 design-sheet"

  optimize_report:
    id: 4
    path: ".ritsu/optimize-report-{YYYYMMDD-HHMMSS}.md"
    required_sections:
      - title: "执行摘要"
        fields:
          - name: total_items
          - name: succeeded
