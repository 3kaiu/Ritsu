# Ritsu MCP Tool Schema 声明 v7.1.0

tools:
  - name: ritsu_emit_event
    description: 追加事件到 ctx 文件
    call_template:
      tool: ritsu_emit_event
      params:
        event_type: "{started|done|failed|artifact_written|violation_detected}"
        step: "{N}/{M}"
        skill: "{skill_name}"
        domain: "{value}"
    input:
      event_type:
        type: enum
        values: [started, done, failed, artifact_written, violation_detected]
        required: true
      step:
        type: string
        required: false
      correlation_id:
        type: string
        required: false
      trace_id:
        type: string
        required: false
      span_id:
        type: string
        required: false
      agent:
        type: object
        required: false
      skill:
        type: string
        required: false
      domain:
        type: string
        required: false
      artifact:
        type: string
        required: false
      error:
        type: string
        required: false
      artifact_meta:
        type: object
        required: false
      violation:
        type: object
        required: false
    output_schema:
      type: object
      required: [written, line_count]
      properties:
        written: { type: boolean }
        line_count: { type: integer }

  - name: ritsu_read_ctx
    description: 读取 ctx 状态摘要
    call_template:
      tool: ritsu_read_ctx
      params: {}
    input:
      detail:
        type: boolean
        required: false
        description: "Full details (default: compact)"
      token_budget:
        type: integer
        required: false
        description: "Estimated token budget for context"
    output_schema:
      type: object
      required: [last_incomplete, last_completed, recent_entries, recovery_context]
      properties:
        last_incomplete: { type: object }
        last_completed: { type: object }
        recent_entries: { type: array }
        recovery_context: { type: object }

  - name: ritsu_write_artifact
    description: "写入/修补产物到 .ritsu/。action=patch 时进行增量替换（提供 target_content 和 replacement_content）。"
    call_template:
      tool: ritsu_write_artifact
      params:
        type: "{type}"
        filename: "{filename}"
        content: "{content}"
    input:
      action:
        type: enum
        values: [write, patch]
        required: false
        description: "write (default) or patch for incremental replacement"
      type:
        type: enum
        values: [design-sheet, design-brief, dev-report, assurance-sheet, diagnosis, coordination-sheet, deploy-plan, deploy-report]
        required: false
      filename: { type: string, required: true }
      content: { type: string, required: false }
      target_content: { type: string, required: false, description: "Text to replace (action=patch)" }
      replacement_content: { type: string, required: false, description: "Replacement text (action=patch)" }
      artifact_meta: { type: object, required: false }
    output_schema:
      type: object
      required: [path, size_bytes]
      properties:
        path: { type: string }
        size_bytes: { type: integer }

  - name: ritsu_run_quality_gates
    description: 质量门禁
    call_template:
      tool: ritsu_run_quality_gates
      params:
        skip_lint: false
        skip_test: false
        trace_id: "{trace_id}"
        span_id: "{span_id}"
    input:
      skip_lint: { type: boolean, required: false }
      skip_test: { type: boolean, required: false }
      skip_policy: { type: boolean, required: false }
      timeout_ms: { type: integer, required: false }
      correlation_id: { type: string, required: false }
      trace_id: { type: string, required: false }
      span_id: { type: string, required: false }
      parent_span_id: { type: string, required: false }
      skill: { type: string, required: false }
      domain: { type: string, required: false }
    output_schema:
      type: object
      required: [passed, lint, test]
      properties:
        passed: { type: boolean }
        lint: { type: object }
        test: { type: object }

  - name: ritsu_coordination
    description: "Multi-agent coordination: claim/release/list files and tasks. Prevents two agents from modifying the same file simultaneously."
    call_template:
      tool: ritsu_coordination
      params:
        action: claim_file
        path: "{file_path}"
        span_id: "{span_id}"
    input:
      action:
        type: enum
        values: [claim_file, release_file, list_files, claim_task, list_tasks]
        required: true
      path: { type: string, required: false, description: "File path (claim_file, release_file)" }
      span_id: { type: string, required: false }
      agent_id: { type: string, required: false, description: "Agent ID (claim_task)" }
      ttl_ms: { type: integer, required: false, description: "Lease TTL in ms (claim_file)" }
      target_paths: { type: list, items: { type: string }, required: false, description: "Allowed target paths for the claimed task" }
    output_schema:
      type: object

  - name: ritsu_preflight
    description: "阶段预检: 一键加载上下文"
    call_template:
      tool: ritsu_preflight
      params:
        stage: "{think|dev|hunt|review}"
        tier: "{P0|P1|P2}"
        task_summary: "{summary}"
    input:
      stage:
        type: enum
        values: [think, dev, hunt, review]
        required: true
      tier:
        type: string
        required: false
      task_summary:
        type: string
        required: false
      detail:
        type: boolean
        required: false
        description: "Whether to eager load full context details (default: false)"
    output_schema:
      type: object
      required: [ok, context_pack]
      properties:
        ok: { type: boolean }
        context_pack: { type: object }

  - name: ritsu_learn
    description: "Scan recent corrections and auto-synthesize preference rules."
    call_template:
      tool: ritsu_learn
      params: {}
    input:
      days:
        type: number
        required: false
        description: "How many days back to scan (default: 7, max: 90)"
    output_schema:
      type: object
      required: [learned, added_count]
      properties:
        learned: { type: boolean }
        added_count: { type: integer }

  - name: ritsu_agent_status
    description: "Query active agents — who is working on what, current step, last artifact. Use before starting work to avoid conflicts."
    call_template:
      tool: ritsu_agent_status
      params: {}
    input:
      current_span_only:
        type: boolean
        required: false
        description: "Only show active spans (default: true)"
    output_schema:
      type: object
      required: [active_count, agents]
      properties:
        active_count: { type: integer }
        agents: { type: array }

  - name: ritsu_visual_check
    description: "Visual fidelity check — renders a URL with Playwright and compares against a design image. Returns pixel diff %, style differences, and layout intent mismatches. Requires Playwright (optional dependency)."
    call_template:
      tool: ritsu_visual_check
      params:
        url: "http://localhost:5173"
        design_image: "design.png"
    input:
      url:
        type: string
        required: true
        description: "Local dev server URL to render"
      design_image:
        type: string
        required: false
        description: "Path to design PNG file"
      design_prompt:
        type: string
        required: false
        description: "Describe the design if no image available"
      viewport_width:
        type: integer
        required: false
        description: "Viewport width (default: 1440)"
      viewport_height:
        type: integer
        required: false
        description: "Viewport height (default: 900)"
      force:
        type: boolean
        required: false
        description: "Force re-capture (default: false)"
    output_schema:
      type: object
      required: [ok, score]
      properties:
        ok: { type: boolean }
        score: { type: integer }
        pixel_diff_pct: { type: number }
        style_issues: { type: object }
        capture_id: { type: string }

  - name: ritsu_launch_agent
    description: "Launch an AI coding agent subprocess (Claude Code or Codex) with a focused prompt. Used internally by ritsu_dispatch_task for multi-agent orchestration."
    call_template:
      tool: ritsu_launch_agent
      params:
        prompt: "{instruction}"
        agent_type: "claude"
    input:
      prompt:
        type: string
        required: true
        description: "The prompt/instruction for the agent"
      agent_type:
        type: enum
        values: [claude, codex]
        required: false
        description: "Which agent CLI to use (default: claude)"
      timeout_ms:
        type: integer
        required: false
        description: "Max execution time in ms (default: 300000, max: 600000)"
      trace_id:
        type: string
        required: false
        description: "Parent trace ID for RITSU_TRACE_PARENT propagation"
      span_id:
        type: string
        required: false
        description: "Span ID for trace linking"
    output_schema:
      type: object
      required: [agent_id, ok, output, exit_code, duration_ms]
      properties:
        agent_id: { type: string }
        ok: { type: boolean }
        output: { type: string }
        exit_code: { type: integer }
        duration_ms: { type: integer }

  - name: ritsu_dispatch_task
    description: "Multi-agent task dispatch. Splits a design-sheet into sub-tasks, launches agents in parallel, cross-reviews results, and detects conflicts. Use for P2 tasks with 3+ contracts."
    call_template:
      tool: ritsu_dispatch_task
      params:
        agents: 2
        cross_review: true
    input:
      design_sheet_path:
        type: string
        required: false
        description: "Path to design-sheet (default: latest in .ritsu/)"
      agents:
        type: integer
        required: false
        description: "Number of parallel agents (default: 2, max: 8)"
      cross_review:
        type: boolean
        required: false
        description: "Enable cross-review between agents (default: true)"
      trace_id:
        type: string
        required: false
        description: "Trace ID for linking sub-agent spans"
    output_schema:
      type: object
      required: [ok, agents, conflicts]
      properties:
        ok: { type: boolean }
        agents: { type: array }
        conflicts: { type: array }
        divergence_rate: { type: number }
        all_quality_gates_passed: { type: boolean }
        total_duration_ms: { type: integer }

  - name: write_file
    description: "Write content to a file at the specified path (proxied and verified by Ritsu policy engine)."
    call_template:
      tool: write_file
      params:
        path: "{path}"
        content: "{content}"
    input:
      path:
        type: string
        required: true
        description: "Absolute or relative path to the file"
      content:
        type: string
        required: true
        description: "The complete content to write"
    output_schema:
      type: object
      required: [success, path]
      properties:
        success: { type: boolean }
        path: { type: string }

  - name: ritsu_d2c_compile
    description: "DSL → Spec 编译器。输入原始 DSL 数据，输出确定性的 d2c-spec.json。所有值已计算完毕，AI 只需按 spec 序列化为代码。"
    call_template:
      tool: ritsu_d2c_compile
      params:
        dsl_sections: "{dsl_sections}"
        root_metadata: "{root_metadata}"
    input:
      dsl_sections:
        type: string
        required: true
        description: "所有 section DSL 合并后的 JSON 字符串"
      root_metadata:
        type: object
        required: true
        description: "rootMetadata（width, height, name, type, fills）"
      split_containers:
        type: array
        required: false
        description: "splitContainers 数组"
      svgs:
        type: object
        required: false
        description: "getDesignSvgs 返回的 SVG map"
      texts:
        type: object
        required: false
        description: "getDesignTexts 返回的 text map"
      styles_map:
        type: object
        required: false
        description: "DSL 中的 styles map（fillStyleId → color 映射）"
      project_root:
        type: string
        required: false
        description: "项目根目录路径（用于技术栈扫描，不传则 cwd）"
    output_schema:
      type: object
      required: [ok, spec_path, environment, total_nodes]
      properties:
        ok: { type: boolean }
        spec_path: { type: string }
        environment: { type: object }
        total_nodes: { type: integer }
        warnings: { type: array }

  - name: ritsu_dsl_validate
    description: "节点级验证。对比 d2c-spec.json 与生成代码中的 [data-mg-id] 元素。"
    call_template:
      tool: ritsu_dsl_validate
      params:
        html_path: "{html_path}"
        spec_path: "{spec_path}"
    input:
      html_path:
        type: string
        required: true
        description: "生成的代码文件路径"
      spec_path:
        type: string
        required: true
        description: "d2c-spec.json 路径"
    output_schema:
      type: object
      required: [ok, score, total_nodes, matched_nodes, missing_nodes, mismatched_styles]
      properties:
        ok: { type: boolean }
        score: { type: integer }
        total_nodes: { type: integer }
        matched_nodes: { type: integer }
        missing_nodes: { type: array }
        mismatched_styles: { type: array }


