# Ritsu MCP Tool Schema 声明 v5.2.0

tools:
  - name: ritsu_emit_event
    description: 向当月 ctx 文件追加一条结构化事件记录。仅 Critical (P2) 级别强制。
    call_template:
      tool: ritsu_emit_event
      params:
        event_type: "{started|done|failed|artifact_written}"
        step: "{N}/{M}"
        skill: "{skill_name}"
        domain: "{value}"
    input:
      event_type:
        type: enum
        values: [started, done, failed, artifact_written]
        required: true
      step:
        type: string
        required: false
      correlation_id:
        type: string
        required: false
      trace_id:
        type: string
        required: false
      span_id:
        type: string
        required: false
      agent:
        type: object
        required: false
      skill:
        type: string
        required: false
      domain:
        type: string
        required: false
      artifact:
        type: string
        required: false
      error:
        type: string
        required: false
      artifact_meta:
        type: object
        required: false
    output_schema:
      type: object
      required: [written, line_count]
      properties:
        written: { type: boolean }
        line_count: { type: integer }

  - name: ritsu_read_ctx
    description: 读取当月 ctx 文件的状态摘要。返回 last_incomplete、last_completed 等。
    call_template:
      tool: ritsu_read_ctx
      params: {}
    input:
      detail:
        type: boolean
        required: false
        description: "If true, returns full event history and detailed failure analysis. Default is false (compact mode)."
    output_schema:
      type: object
      required: [last_incomplete, last_completed, recent_entries, recovery_context]
      properties:
        last_incomplete: { type: object }
        last_completed: { type: object }
        recent_entries: { type: array }
        recovery_context: { type: object }

  - name: ritsu_read_agents
    description: 读取并解析 AGENTS.md，返回 domain、version 等，并执行环境感知。
    call_template:
      tool: ritsu_read_agents
      params: {}
    input: {}
    output_schema:
      type: object
      required: [path, domain]
      properties:
        path: { type: string }
        ritsu_version: { type: string }
        domain: { type: string }
        tech_fingerprints: { type: array }

  - name: ritsu_write_artifact
    description: 写入产物文件到 .ritsu/ 目录。支持 design-sheet/design-brief/dev-report/assurance-sheet/diagnosis。
    call_template:
      tool: ritsu_write_artifact
      params:
        type: "{type}"
        filename: "{filename}"
        content: "{content}"
    input:
      type:
        type: enum
        values: [design-sheet, design-brief, dev-report, assurance-sheet, diagnosis, coordination-sheet]
        required: true
      filename: { type: string, required: true }
      content: { type: string, required: true }
      artifact_meta: { type: object, required: false }
    output_schema:
      type: object
      required: [path, size_bytes]
      properties:
        path: { type: string }
        size_bytes: { type: integer }

  - name: ritsu_list_artifacts
    description: 列出 .ritsu/ 目录下的产物文件。
    call_template:
      tool: ritsu_list_artifacts
      params:
        type: "all"
    input:
      type: { type: string, required: false }
    output_schema:
      type: object
      required: [files, total_count]
      properties:
        files: { type: array }
        total_count: { type: integer }

  - name: ritsu_exec
    description: 在项目根目录执行单命令（内置安全边界）。
    call_template:
      tool: ritsu_exec
      params:
        command: "{命令}"
    input:
      command: { type: string, required: true }
      max_output_lines: { type: integer, required: false }
      timeout_ms: { type: integer, required: false }
    output_schema:
      type: object
      required: [ok, output]
      properties:
        ok: { type: boolean }
        output: { type: string }

  - name: ritsu_get_changed_files
    description: 获取 Git 变更文件列表。
    call_template:
      tool: ritsu_get_changed_files
      params:
        staged: true
        unstaged: true
    input:
      staged: { type: boolean, required: false }
      unstaged: { type: boolean, required: false }
    output_schema:
      type: object
      required: [files, total, domain_hint]
      properties:
        files: { type: array }
        total: { type: integer }
        domain_hint: { type: string }

  - name: ritsu_get_diff
    description: 获取 Git diff 结构化分析。
    call_template:
      tool: ritsu_get_diff
      params:
        cached: false
    input:
      cached: { type: boolean, required: false }
      max_output_lines: { type: integer, required: false }
    output_schema:
      type: object
      required: [files, total_files, diff]
      properties:
        files: { type: array }
        total_files: { type: integer }
        diff: { type: string }

  - name: ritsu_run_quality_gates
    description: 执行项目质量门禁（Lint + Test）。
    call_template:
      tool: ritsu_run_quality_gates
      params:
        skip_lint: false
        skip_test: false
    input:
      skip_lint: { type: boolean, required: false }
      skip_test: { type: boolean, required: false }
      timeout_ms: { type: integer, required: false }
    output_schema:
      type: object
      required: [passed, lint, test]
      properties:
        passed: { type: boolean }
        lint: { type: object }
        test: { type: object }

  - name: ritsu_read_preferences
    description: 读取项目级用户偏好（从历史 review 中学习到的规则）。
    call_template:
      tool: ritsu_read_preferences
    input: {}
    output_schema:
      type: object
      properties:
        rules: { type: array }

  - name: ritsu_write_preference
    description: 写入或更新项目级用户偏好。
    call_template:
      tool: ritsu_write_preference
      params:
        rule: { pattern: "{pattern}", scope: "{scope}" }
    input:
      rule:
        type: object
        properties:
          pattern: { type: string, required: true }
          scope:
            type: enum
            values: [coding_style, library_choice, naming_convention, architecture]
            required: true
          source: { type: string }
          auto_inject_to: { type: array }
          confidence: { type: number }
    output_schema:
      type: object
      properties:
        ok: { type: boolean }
        id: { type: string }
        matches: { type: array }

  - name: ritsu_open_span
    description: 创建 root 或 child span，写入 started 事件。
    call_template:
      tool: ritsu_open_span
      params:
        skill: "{skill_name}"
        domain: "{value}"
    input:
      skill: { type: string, required: true }
      domain: { type: string, required: true }
      trace_id: { type: string, required: false }
      parent_span_id: { type: string, required: false }
      agent: { type: object, required: false }
    output_schema:
      type: object
      required: [trace_id, span_id, status]
      properties:
        trace_id: { type: string }
        span_id: { type: string }
        status: { type: string }

  - name: ritsu_close_span
    description: 关闭 span，写入 done 或 failed 事件。
    call_template:
      tool: ritsu_close_span
      params:
        trace_id: "{trace_id}"
        span_id: "{span_id}"
        status: "done"
        skill: "{skill_name}"
        domain: "{value}"
    input:
      trace_id: { type: string, required: true }
      span_id: { type: string, required: true }
      status: { type: enum, values: [done, failed], required: true }
      skill: { type: string, required: true }
      domain: { type: string, required: true }
      error: { type: string, required: false }
      cost: { type: object, required: false }
    output_schema:
      type: object
      required: [trace_id, span_id, status]
      properties:
        trace_id: { type: string }
        span_id: { type: string }
        status: { type: string }

  - name: ritsu_join_trace
    description: 查询 trace 状态，返回 span tree 与 artifacts 列表。
    call_template:
      tool: ritsu_join_trace
      params:
        trace_id: "{trace_id}"
    input:
      trace_id: { type: string, required: true }
    output_schema:
      type: object
      required: [trace_id, tree, artifacts]
      properties:
        trace_id: { type: string }
        tree: { type: array }
        artifacts: { type: array }

