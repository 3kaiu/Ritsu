# Ritsu MCP Tool Schema 声明 v7.1.0

tools:
  - name: ritsu_emit_event
    description: 追加事件到 ctx 文件
    call_template:
      tool: ritsu_emit_event
      params:
        event_type: "{started|done|failed|artifact_written|violation_detected}"
        step: "{N}/{M}"
        skill: "{skill_name}"
        domain: "{value}"
    input:
      event_type:
        type: enum
        values: [started, done, failed, artifact_written, violation_detected]
        required: true
      step:
        type: string
        required: false
      correlation_id:
        type: string
        required: false
      trace_id:
        type: string
        required: false
      span_id:
        type: string
        required: false
      agent:
        type: object
        required: false
      skill:
        type: string
        required: false
      domain:
        type: string
        required: false
      artifact:
        type: string
        required: false
      error:
        type: string
        required: false
      artifact_meta:
        type: object
        required: false
      violation:
        type: object
        required: false
    output_schema:
      type: object
      required: [written, line_count]
      properties:
        written: { type: boolean }
        line_count: { type: integer }

  - name: ritsu_read_ctx
    description: 读取 ctx 状态摘要
    call_template:
      tool: ritsu_read_ctx
      params: {}
    input:
      detail:
        type: boolean
        required: false
        description: "Full details (default: compact)"
      token_budget:
        type: integer
        required: false
        description: "Estimated token budget for context"
    output_schema:
      type: object
      required: [last_incomplete, last_completed, recent_entries, recovery_context]
      properties:
        last_incomplete: { type: object }
        last_completed: { type: object }
        recent_entries: { type: array }
        recovery_context: { type: object }

  - name: ritsu_write_artifact
    description: "写入/修补产物到 .ritsu/。action=patch 时进行增量替换（提供 target_content 和 replacement_content）。"
    call_template:
      tool: ritsu_write_artifact
      params:
        type: "{type}"
        filename: "{filename}"
        content: "{content}"
    input:
      action:
        type: enum
        values: [write, patch]
        required: false
        description: "write (default) or patch for incremental replacement"
      type:
        type: enum
        values: [design-sheet, design-brief, dev-report, assurance-sheet, diagnosis, coordination-sheet]
        required: false
      filename: { type: string, required: true }
      content: { type: string, required: false }
      target_content: { type: string, required: false, description: "Text to replace (action=patch)" }
      replacement_content: { type: string, required: false, description: "Replacement text (action=patch)" }
      artifact_meta: { type: object, required: false }
    output_schema:
      type: object
      required: [path, size_bytes]
      properties:
        path: { type: string }
        size_bytes: { type: integer }

  - name: ritsu_run_quality_gates
    description: 质量门禁
    call_template:
      tool: ritsu_run_quality_gates
      params:
        skip_lint: false
        skip_test: false
        trace_id: "{trace_id}"
        span_id: "{span_id}"
    input:
      skip_lint: { type: boolean, required: false }
      skip_test: { type: boolean, required: false }
      skip_policy: { type: boolean, required: false }
      timeout_ms: { type: integer, required: false }
      correlation_id: { type: string, required: false }
      trace_id: { type: string, required: false }
      span_id: { type: string, required: false }
      parent_span_id: { type: string, required: false }
      skill: { type: string, required: false }
      domain: { type: string, required: false }
    output_schema:
      type: object
      required: [passed, lint, test]
      properties:
        passed: { type: boolean }
        lint: { type: object }
        test: { type: object }

  - name: ritsu_file_lease
    description: "文件锁定: claim/release/list"
    call_template:
      tool: ritsu_file_lease
      params:
        action: claim
        path: "{file_path}"
        span_id: "{span_id}"
    input:
      action:
        type: enum
        values: [claim, release, list]
        required: true
      path: { type: string, required: false }
      span_id: { type: string, required: false }
      ttl_ms: { type: integer, required: false }
    output_schema:
      type: object

  - name: ritsu_task_coordination
    description: "任务协同: claim/list"
    call_template:
      tool: ritsu_task_coordination
      params:
        action: claim
        span_id: "{span_id}"
        agent_id: "{agent_id}"
    input:
      action:
        type: enum
        values: [claim, list]
        required: true
      span_id: { type: string, required: false }
      agent_id: { type: string, required: false }
    output_schema:
      type: object

  - name: ritsu_preflight
    description: "阶段预检: 一键加载上下文"
    call_template:
      tool: ritsu_preflight
      params:
        stage: "{think|dev|hunt|review}"
        tier: "{P0|P1|P2}"
        task_summary: "{summary}"
    input:
      stage:
        type: enum
        values: [think, dev, hunt, review]
        required: true
      tier:
        type: string
        required: false
      task_summary:
        type: string
        required: false
      detail:
        type: boolean
        required: false
        description: "Whether to eager load full context details (default: false)"
    output_schema:
      type: object
      required: [ok, context_pack]
      properties:
        ok: { type: boolean }
        context_pack: { type: object }

  - name: ritsu_learn
    description: "Scan recent corrections and auto-synthesize preference rules."
    call_template:
      tool: ritsu_learn
      params: {}
    input:
      days:
        type: number
        required: false
        description: "How many days back to scan (default: 7, max: 90)"
    output_schema:
      type: object
      required: [learned, added_count]
      properties:
        learned: { type: boolean }
        added_count: { type: integer }

  - name: ritsu_agent_status
    description: "Query active agents — who is working on what, current step, last artifact. Use before starting work to avoid conflicts."
    call_template:
      tool: ritsu_agent_status
      params: {}
    input:
      current_span_only:
        type: boolean
        required: false
        description: "Only show active spans (default: true)"
    output_schema:
      type: object
      required: [active_count, agents]
      properties:
        active_count: { type: integer }
        agents: { type: array }
