# Ritsu MCP Tool Schema 声明 v3.8.0
# 所有技能中的工具调用必须引用此文件中声明的工具名，禁止用自然语言描述工具调用行为。
# AI 执行时应将此文件视为"可用工具菜单"，按 Schema 构造调用参数。
# 运行时注册 MCP Server 时，从此文件编译为 JSON Schema。
#
# ⚠️ SDK + 业务工具模式：MCP Server 提供 SDK 原语 + 高频业务封装。
# SKILL.md = 程序，AI = CPU，MCP 工具 = 系统调用。
#
# ⚠️ 结构化调用模板：LLM 必须按 call_template 构造参数，禁止自由推断。
# call_template 是 input 的快捷视图（DRY），若两者冲突以 input 为准。
# ⚠️ output_schema：定义工具返回值的 JSON Schema，供 UI 渲染 ToolCallCard 组件。

tools:
  - name: ritsu_emit_event
    description: 向当月 ctx 文件追加一条结构化事件记录。写入前自动校验是否符合 ctx-event-schema.json。仅支持 4 种核心事件类型（started/done/failed/artifact_written），审批/步骤进度/熔断等通过 AI 自然语言输出
    call_template:
      tool: ritsu_emit_event
      params:
        event_type: "{started|done|failed|artifact_written}"
        step: "{N}/{M}"
        skill: "{skill_name}"
        domain: "{value}"
      example:
        event_type: "done"
        step: "7/7"
        skill: "dev"
        domain: "frontend"
    input:
      event_type:
        type: enum
        values: [started, done, failed, artifact_written]
        required: true
        description: "事件类型（精简为 4 种核心类型：started=会话恢复, done/failed=状态判定, artifact_written=产物追踪）"
      step:
        type: string
        required: false
        description: "步骤进度，格式 N/M（started/done/artifact_written 时必填）"
      correlation_id:
        type: string
        required: false
        description: "任务链路关联 ID（自动生成，格式 cid-{YYYYMMDD}-{seq}，同链路自动继承，通常无需手动指定）"
      skill:
        type: string
        required: false
        description: "当前技能名"
      domain:
        type: string
        required: false
        description: "当前领域"
      artifact:
        type: string
        required: false
        description: "产物文件路径（artifact_written 时必填）"
      error:
        type: string
        required: false
        description: "failed 时必填"
      artifact_meta:
        type: object
        required: false
        description: "artifact_written 事件时必填"
    validation: "写入前校验事件是否符合 _shared/ctx-event-schema.json 的 if-then 条件"
    concurrency_control: "原子追加锁"
    output_schema:
      type: object
      required: [written, line_count]
      properties:
        written:
          type: boolean
          description: "是否写入成功"
        line_count:
          type: integer
          description: "当前 ctx 文件总行数（写入后）"
        correlation_id:
          type: string
          description: "事件关联 ID"

  - name: ritsu_read_ctx
    description: 读取当月 ctx 文件的状态摘要。返回 last_incomplete、last_completed、recent_entries，以及自动计算的 recovery_context（可操作恢复上下文）、reality_check（现实对账）、circuit_breaker_status（熔断状态）
    call_template:
      tool: ritsu_read_ctx
      params: {}
    input: {}
    output_schema:
      type: object
      required:
        [
          last_incomplete,
          last_completed,
          recent_entries,
          recovery_context,
          reality_check,
          circuit_breaker_status,
        ]
      properties:
        last_incomplete:
          type: object
          description: "最后一条未完成事件（status=started 且无对应 done/failed）"
          properties:
            correlation_id: { type: string }
            skill: { type: string }
            domain: { type: string }
            step: { type: string }
        last_completed:
          type: object
          description: "最后一条已完成事件（status=done）"
          properties:
            correlation_id: { type: string }
            skill: { type: string }
            domain: { type: string }
            artifact: { type: string }
        recent_entries:
          type: array
          description: "最近 10 条事件"
          items:
            type: object
        recent_entries_pruned:
          type: array
          description: "剪枝后的最近事件（优先 done/artifact_written，failed 聚合到 failed_summary）"
          items:
            type: object
        failed_summary:
          type: object
          description: "failed 事件摘要压缩（按 skill 聚合），用于节省 token"
        recovery_context:
          type: object
          description: "可操作恢复上下文（仅 last_incomplete 存在时非 null）"
          properties:
            skill: { type: string }
            domain: { type: string }
            step: { type: string }
            correlation_id: { type: string }
            last_artifact: { type: string }
            resume_hint: { type: string }
        reality_check:
          type: object
          description: "现实对账结果（检查 artifact 是否仍存在）"
          properties:
            desync_detected: { type: boolean }
            missing_artifacts: { type: array, items: { type: string } }
        circuit_breaker_status:
          type: object
          description: "熔断状态（连续 failed >=2 时 should_redirect=think）"
          properties:
            consecutive_fails: { type: integer }
            should_redirect: { type: string }
            last_failed_skill: { type: string }
            last_failed_cid: { type: string }

  - name: ritsu_read_agents
    description: 读取并解析项目根 AGENTS.md，返回结构化的 domain、ritsu_version、tech_fingerprints 以及 rules_overrides（项目级规则覆盖：disable/downgrade/add）
    call_template:
      tool: ritsu_read_agents
      params: {}
    input: {}
    output_schema:
      type: object
      required: [path, domain]
      properties:
        path:
          type: string
          description: "AGENTS.md 绝对路径"
        ritsu_version:
          type: string
          description: "AGENTS.md 中的 ritsu-version（若存在）"
        domain:
          type: string
          description: "AGENTS.md 中的 domain"
        tech_fingerprints:
          type: array
          description: "项目嗅探到的技术栈特征（可选）"
          items:
            type: string
        rules_overrides:
          type: object
          description: "项目级规则覆盖（可选）"
          properties:
            disable:
              type: array
              items: { type: string }
            downgrade:
              type: array
              items:
                type: object
                properties:
                  id: { type: string }
                  severity: { type: string }
            add:
              type: array
              items:
                type: object
                properties:
                  id: { type: string }
                  name: { type: string }
                  scope: { type: string }
                  rule: { type: string }

  - name: ritsu_contract_validate
    description: 契约测试（Contract Validation）。读取最近的 handoff（或指定路径），抽取实施清单中的关键标识符，并对比 git diff 计算覆盖率（coverage_ratio）。低于阈值返回 passed=false。
    call_template:
      tool: ritsu_contract_validate
      params:
        min_coverage: 0.8
        cached: false
      example:
        min_coverage: 0.8
        cached: false
    input:
      min_coverage:
        type: number
        required: false
        description: "最低覆盖率阈值（0-1），默认 0.8"
      cached:
        type: boolean
        required: false
        description: "是否使用 git diff --cached（默认 false）"
      handoff_path:
        type: string
        required: false
        description: "显式指定 handoff 文件路径（可选），为空则自动选择 .ritsu 下最新的 handoff-*"
    output_schema:
      type: object
      required: [passed, coverage_ratio, expected_total, handoff_path]
      properties:
        passed: { type: boolean }
        min_coverage: { type: number }
        coverage_ratio: { type: number }
        expected_total: { type: integer }
        covered: { type: array, items: { type: string } }
        missing: { type: array, items: { type: string } }
        handoff_path: { type: string }
        cached: { type: boolean }

  - name: ritsu_build_kg
    description: 构建 Project Knowledge Graph（TS/JS）。抽取模块依赖（import/require）与 symbol 定义/引用关系，写入 .ritsu/kg.json，供影响分析使用。
    call_template:
      tool: ritsu_build_kg
      params:
        max_files: 2000
      example:
        max_files: 2000
    input:
      max_files:
        type: number
        required: false
        description: "最多扫描文件数（默认 2000，上限 5000）"
    output_schema:
      type: object
      required: [written, path, files_total, symbols_total, edges_total]
      properties:
        written: { type: boolean }
        path: { type: string }
        files_total: { type: integer }
        symbols_total: { type: integer }
        edges_total: { type: integer }
        generated_at: { type: string }

  - name: ritsu_query_kg
    description: 查询 Project Knowledge Graph（影响分析）。支持 impact（反向依赖闭包）、deps（正向依赖闭包）、symbol（查符号的调用方）。
    call_template:
      tool: ritsu_query_kg
      params:
        mode: "impact"
        target: "src/foo.ts"
        depth: 3
      example:
        mode: "impact"
        target: "src/foo.ts"
        depth: 3
    input:
      mode:
        type: enum
        values: [impact, deps, symbol]
        required: false
        description: "查询模式（默认 impact）"
      target:
        type: string
        required: false
        description: "目标文件路径（相对项目根）"
      depth:
        type: number
        required: false
        description: "BFS 深度（默认 3，上限 10）"
      top_n:
        type: number
        required: false
        description: "返回的 impacted/deps 截断数量（默认 15，上限 50）"
      symbol:
        type: string
        required: false
        description: "当 mode=symbol 时必填"
    output_schema:
      type: object
      properties:
        mode: { type: string }
        target: { type: string }
        depth: { type: integer }
        impacted: { type: array, items: { type: string } }
        impacted_count: { type: integer }
        deps: { type: array, items: { type: string } }
        deps_count: { type: integer }
        paths:
          type: array
          description: "可解释的最短链路列表"
          items:
            type: object
            properties:
              node: { type: string }
              path: { type: array, items: { type: string } }
        symbol: { type: string }
        defined_in: { type: string }
        callers: { type: array, items: { type: string } }
        callers_count: { type: integer }
        kg_generated_at: { type: string }

  - name: ritsu_env_probe
    description: 环境嗅探（Self-Healing Sandbox MVP）。检查 git/worktree 可用性、node 版本、.ritsu 临时目录可写性，以及 .env/.env.example 键缺失情况。仅做只读探测。
    call_template:
      tool: ritsu_env_probe
      params: {}
    input: {}
    output_schema:
      type: object
      required: [project_root, tools, git, sandbox]
      properties:
        project_root: { type: string }
        platform: { type: string }
        arch: { type: string }
        tools:
          type: object
          properties:
            git:
              type: object
              properties:
                ok: { type: boolean }
                output: { type: string }
            node:
              type: object
              properties:
                ok: { type: boolean }
                output: { type: string }
        git:
          type: object
          properties:
            is_inside_work_tree: { type: string }
            worktree_list_ok: { type: boolean }
            worktree_list: { type: string }
        sandbox:
          type: object
          properties:
            ritsu_dir: { type: string }
            temp_dir: { type: string }
            ritsu_dir_writable: { type: boolean }
            temp_dir_writable: { type: boolean }
        has_env_example: { type: boolean }
        has_env: { type: boolean }
        expected_env_keys: { type: array, items: { type: string } }
        missing_env_keys: { type: array, items: { type: string } }

  - name: ritsu_sandbox_prepare
    description: 创建 Git worktree 沙盒（Self-Healing Sandbox MVP）。在 .ritsu/temp/{correlation_id} 下创建一个 detach worktree，用于隔离执行与自愈尝试。
    call_template:
      tool: ritsu_sandbox_prepare
      params:
        correlation_id: "{cid}"
        base_ref: "HEAD"
      example:
        correlation_id: "cid-20260511-001"
        base_ref: "HEAD"
    input:
      correlation_id:
        type: string
        required: true
        description: "任务链路关联 ID，用作沙盒目录名"
      base_ref:
        type: string
        required: false
        description: "worktree 基线引用（默认 HEAD）"
    output_schema:
      type: object
      required: [ok, sandbox_path, base_ref]
      properties:
        ok: { type: boolean }
        sandbox_path: { type: string }
        base_ref: { type: string }

  - name: ritsu_sandbox_exec
    description: 在 Git worktree 沙盒中执行命令（Self-Healing Sandbox MVP）。复用 ritsu_exec 的安全边界（白名单二进制 + shell 元字符拦截 + 危险参数/残余黑名单），且不经 shell 解释。
    call_template:
      tool: ritsu_sandbox_exec
      params:
        correlation_id: "{cid}"
        command: "{命令}"
      example:
        correlation_id: "cid-20260511-001"
        command: "git status --porcelain"
    input:
      correlation_id:
        type: string
        required: true
        description: "任务链路关联 ID，对应 .ritsu/temp/{correlation_id}"
      command:
        type: string
        required: true
        description: "要执行的命令（单命令，不支持管道/重定向）"
      max_output_lines:
        type: integer
        required: false
        description: "最大输出行数（默认 200）"
      timeout_ms:
        type: integer
        required: false
        description: "超时毫秒数（默认 30000）"
      max_buffer_mb:
        type: integer
        required: false
        description: "最大输出缓冲 MB（默认 10）"
    safety_boundary: "三层防护：shell 元字符阻断（管道/重定向/子shell）+ 白名单二进制 + 危险参数/用法黑名单"
    output_schema:
      type: object
      required: [ok, output, cwd]
      properties:
        ok: { type: boolean }
        output: { type: string }
        cwd: { type: string }

  - name: ritsu_sandbox_cleanup
    description: 清理 Git worktree 沙盒（Self-Healing Sandbox MVP）。移除 .ritsu/temp/{correlation_id} worktree 并删除目录，幂等。
    call_template:
      tool: ritsu_sandbox_cleanup
      params:
        correlation_id: "{cid}"
      example:
        correlation_id: "cid-20260511-001"
    input:
      correlation_id:
        type: string
        required: true
        description: "任务链路关联 ID，对应 .ritsu/temp/{correlation_id}"
    output_schema:
      type: object
      required: [ok, removed, sandbox_path]
      properties:
        ok: { type: boolean }
        removed: { type: boolean }
        sandbox_path: { type: string }
        warning: { type: string }

  - name: ritsu_ts_check
    description: TypeScript/JavaScript 编译上下文静态检查（工程友好）。在项目根目录运行 tsc --noEmit（不产出文件），返回结构化 diagnostics。用于替代 grep 的“存在性校验”，升级为编译器级签名/类型校验。
    call_template:
      tool: ritsu_ts_check
      params:
        tsconfig_path: "tsconfig.json"
        max_diagnostics: 50
        timeout_ms: 60000
      example:
        tsconfig_path: "tsconfig.json"
        max_diagnostics: 50
        timeout_ms: 60000
    input:
      tsconfig_path:
        type: string
        required: false
        description: "tsconfig.json 路径（相对项目根，默认 tsconfig.json）"
      max_diagnostics:
        type: integer
        required: false
        description: "最多返回的诊断条数（默认 50，上限 200）"
      timeout_ms:
        type: integer
        required: false
        description: "超时毫秒数（默认 60000，上限 120000）"
    output_schema:
      type: object
      required: [passed, diagnostics, diagnostics_count, tsconfig_path]
      properties:
        passed: { type: boolean }
        tsconfig_path: { type: string }
        diagnostics_count: { type: integer }
        diagnostics:
          type: array
          items:
            type: object
            properties:
              file: { type: string }
              line: { type: integer }
              col: { type: integer }
              code: { type: string }
              message: { type: string }
        raw_output: { type: string }
        truncated: { type: boolean }

  - name: ritsu_ts_symbol_query
    description: TypeScript/JavaScript 符号查询（工程友好，基于 TypeScript 编译器 API）。返回符号的定义位置、推导类型/签名，以及部分引用位置（带上下文片段）。用于将 AP-2 的签名级校验从 grep 升级为类型系统查询。
    call_template:
      tool: ritsu_ts_symbol_query
      params:
        symbol: "{identifier}"
        tsconfig_path: "tsconfig.json"
        max_definitions: 10
        max_references: 20
      example:
        symbol: "ritsu_exec"
        tsconfig_path: "tsconfig.json"
        file_hint: "src/handlers/exec.ts"
        max_definitions: 10
        max_references: 20
    input:
      symbol:
        type: string
        required: true
        description: "要查询的符号名（identifier），如 ritsu_exec / useFoo / SomeType"
      tsconfig_path:
        type: string
        required: false
        description: "tsconfig.json 路径（相对项目根，默认 tsconfig.json）"
      file_hint:
        type: string
        required: false
        description: "可选：将扫描范围限定到指定文件（相对项目根），用于降低噪声与加速"
      max_definitions:
        type: integer
        required: false
        description: "最多返回的定义条数（默认 10，上限 50）"
      max_references:
        type: integer
        required: false
        description: "最多返回的引用条数（默认 20，上限 200）"
    output_schema:
      type: object
      required: [symbol, tsconfig_path, definitions, references]
      properties:
        symbol: { type: string }
        tsconfig_path: { type: string }
        file_hint: { type: string }
        definitions_count: { type: integer }
        references_count: { type: integer }
        definitions:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              kind: { type: string }
              signature: { type: string }
              type: { type: string }
              location:
                type: object
                properties:
                  file: { type: string }
                  line: { type: integer }
                  col: { type: integer }
        references:
          type: array
          items:
            type: object
            properties:
              context: { type: string }
              location:
                type: object
                properties:
                  file: { type: string }
                  line: { type: integer }
                  col: { type: integer }

  - name: ritsu_semantic_index_build
    description: 构建/增量更新 .ritsu 语义索引（本地向量化记忆，Phase-1 MVP）。扫描 handoff/diagnosis/review-stamp/optimize-report 产物，将内容分块并生成 embeddings，写入 .ritsu/semantic-index.json。
    call_template:
      tool: ritsu_semantic_index_build
      params:
        chunk_size: 1200
        chunk_overlap: 200
        max_files: 200
      example:
        chunk_size: 1200
        chunk_overlap: 200
        max_files: 200
    input:
      chunk_size:
        type: integer
        required: false
        description: "分块字符数（默认 1200，上限 4000）"
      chunk_overlap:
        type: integer
        required: false
        description: "分块重叠字符数（默认 200，上限 1000）"
      max_files:
        type: integer
        required: false
        description: "最多扫描文件数（默认 200，上限 2000）"
    output_schema:
      type: object
      required: [ok, index_path, embedder_model, entries_total, entries_added]
      properties:
        ok: { type: boolean }
        index_path: { type: string }
        embedder_model: { type: string }
        files_scanned: { type: integer }
        entries_total: { type: integer }
        entries_added: { type: integer }
        entries_reused: { type: integer }
        dim: { type: integer }

  - name: ritsu_semantic_search
    description: 在 .ritsu 语义索引中进行语义检索（本地向量化记忆，Phase-1 MVP）。返回 top-k 匹配片段、分数与文件路径，用于时空回溯与类似问题召回。
    call_template:
      tool: ritsu_semantic_search
      params:
        query: "{natural_language_query}"
        top_k: 5
        types: [handoff, diagnosis, review-stamp]
      example:
        query: "CI 里 vitest 报错但本地不报"
        top_k: 5
        types: [diagnosis, review-stamp]
    input:
      query:
        type: string
        required: true
        description: "自然语言查询（必填）"
      top_k:
        type: integer
        required: false
        description: "返回匹配条数（默认 5，上限 50）"
      types:
        type: list
        required: false
        description: "产物类型过滤（handoff/diagnosis/review-stamp/optimize-report），为空表示全部"
      chunk_size:
        type: integer
        required: false
        description: "用于生成 snippet 的分块大小（默认 1200）"
      chunk_overlap:
        type: integer
        required: false
        description: "用于生成 snippet 的分块重叠（默认 200）"
    output_schema:
      type: object
      required: [ok, query, matches]
      properties:
        ok: { type: boolean }
        query: { type: string }
        top_k: { type: integer }
        index_path: { type: string }
        embedder_model: { type: string }
        total_index_entries: { type: integer }
        matches:
          type: array
          items:
            type: object
            properties:
              score: { type: number }
              path: { type: string }
              artifact_type: { type: string }
              chunk_index: { type: integer }
              snippet: { type: string }

  - name: ritsu_write_artifact
    description: 写入产物文件到 .ritsu/ 目录。自动拦截含占位符（TODO/待定/暂不处理）的写入（ctx 类型除外）。所有产物统一 Markdown 格式
    call_template:
      tool: ritsu_write_artifact
      params:
        type: "{handoff|diagnosis|review-stamp|optimize-report}"
        filename: "{文件名}"
        content: "{内容}"
      example:
        type: "handoff"
        filename: "handoff-20260509-auth.md"
        content: "# Handoff..."
    input:
      type:
        type: enum
        values: [handoff, diagnosis, review-stamp, optimize-report]
        required: true
        description: "产物类型"
      filename:
        type: string
        required: true
        description: "文件名（如 handoff-20260509-auth.md）"
      content:
        type: string
        required: true
        description: "文件内容（Markdown 格式）"
      artifact_meta:
        type: object
        required: false
        description: "产物元数据（type/size_bytes/summary）"
    placeholder_check: "自动检测并拒绝写入含占位符模式的产物（ctx 类型豁免）：TODO/待定/暂不处理/后续补充（=AP-6）。幻觉路径和未验证标识符属于 AI 行为层约束，由 SKILL.md HC 规则执行，工具层不拦截"
    output_schema:
      type: object
      required: [path, size_bytes]
      properties:
        path:
          type: string
          description: "写入文件绝对路径"
        size_bytes:
          type: integer
          description: "文件大小"
        artifact_meta:
          type: object
          description: "产物元数据"

  - name: ritsu_list_artifacts
    description: 列出 .ritsu/ 目录下的产物文件。支持按类型过滤（handoff/diagnosis/review-stamp/optimize-report/ctx）
    call_template:
      tool: ritsu_list_artifacts
      params:
        type: "{类型或all}"
      example:
        type: "handoff"
    input:
      type:
        type: string
        required: false
        description: "产物类型过滤（all/handoff/diagnosis/review-stamp/optimize-report/ctx），默认 all"
    output_schema:
      type: object
      required: [files, total_count]
      properties:
        files:
          type: array
          items:
            type: object
            properties:
              path: { type: string }
              modified: { type: string }
              size_bytes: { type: integer }
              artifact_type: { type: string }
        total_count:
          type: integer

  - name: ritsu_exec
    description: 在项目根目录直接执行命令（不经 shell 解释）并返回结构化输出。只支持单命令执行，不支持管道/重定向/子shell。内置安全边界（白名单二进制 + 危险参数拦截 + shell 元字符阻断）和输出截断。需要管道时请多次调用
    call_template:
      tool: ritsu_exec
      params:
        command: "{命令}"
      example:
        command: "git diff --name-only"
    input:
      command:
        type: string
        required: true
        description: "要执行的命令（单命令，不支持管道/重定向）"
      max_output_lines:
        type: integer
        required: false
        description: "最大输出行数（默认 200）"
      timeout_ms:
        type: integer
        required: false
        description: "超时毫秒数（默认 30000）"
    safety_boundary: "三层防护：shell 元字符阻断（管道/重定向/子shell）+ 白名单二进制 + 危险参数/用法黑名单"
    output_schema:
      type: object
      required: [ok, output]
      properties:
        ok:
          type: boolean
          description: "命令是否成功（exit code 0）"
        output:
          type: string
          description: "命令输出（截断后）"

  - name: ritsu_get_changed_files
    description: 获取 Git 工作区和暂存区的变更文件列表，自动推断领域。返回每个变更文件的路径、状态、扩展名，以及基于文件后缀的领域推断结果。替代 ritsu_exec("git diff --name-only") 的裸命令调用
    call_template:
      tool: ritsu_get_changed_files
      params:
        staged: true
        unstaged: true
    input:
      staged:
        type: boolean
        required: false
        description: "是否包含暂存区变更（默认 true）"
      unstaged:
        type: boolean
        required: false
        description: "是否包含未暂存变更（默认 true）"
    output_schema:
      type: object
      required: [files, total, domain_hint]
      properties:
        files:
          type: array
          items:
            type: object
            properties:
              path: { type: string }
              status: { type: string }
              extension: { type: string }
        total:
          type: integer
        domain_hint:
          type: string

  - name: ritsu_get_diff
    description: 获取 Git diff 的结构化分析结果。包含文件级统计、新增标识符提取、完整 diff 文本。替代 ritsu_exec("git diff") 的裸命令调用，review 技能的核心数据源
    call_template:
      tool: ritsu_get_diff
      params:
        cached: false
    input:
      cached:
        type: boolean
        required: false
        description: "是否查看暂存区 diff（默认 false）"
      max_output_lines:
        type: integer
        required: false
        description: "diff 文本最大行数（默认 500）"
    output_schema:
      type: object
      required: [files, total_files, new_identifiers, diff]
      properties:
        files:
          type: array
          items:
            type: object
            properties:
              path: { type: string }
              additions: { type: integer }
              deletions: { type: integer }
              patch_summary: { type: string }
        total_files:
          type: integer
        new_identifiers:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              file: { type: string }
              line: { type: integer }
        diff:
          type: string
        truncated:
          type: boolean

  - name: ritsu_run_quality_gates
    description: 执行项目 Lint 和 Test 质量门禁，返回结构化结果。自动从 AGENTS.md 或 package.json 解析命令。测试失败时解析失败用例列表。替代 ritsu_exec("npm run lint") + ritsu_exec("npm test") 的裸命令调用
    call_template:
      tool: ritsu_run_quality_gates
      params:
        skip_lint: false
        skip_test: false
    input:
      skip_lint:
        type: boolean
        required: false
        description: "跳过 Lint 检查（默认 false）"
      skip_test:
        type: boolean
        required: false
        description: "跳过 Test 检查（默认 false）"
      timeout_ms:
        type: integer
        required: false
        description: "超时毫秒数（默认 60000）"
    output_schema:
      type: object
      required: [passed, lint, test]
      properties:
        passed:
          type: boolean
          description: "Lint + Test 是否全部通过"
        lint:
          type: object
          properties:
            passed: { type: boolean }
            output: { type: string }
        test:
          type: object
          properties:
            passed: { type: boolean }
            total: { type: integer }
            failures:
              type: array
              items:
                type: object
                properties:
                  suite: { type: string }
                  test: { type: string }
                  error: { type: string }
                  file_hint: { type: string }
            output: { type: string }
