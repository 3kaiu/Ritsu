# Ritsu MCP Tool Schema 声明 v3.5.1
# 所有技能中的工具调用必须引用此文件中声明的工具名，禁止用自然语言描述工具调用行为。
# AI 执行时应将此文件视为"可用工具菜单"，按 Schema 构造调用参数。
# 运行时注册 MCP Server 时，从此文件编译为 JSON Schema。
#
# ⚠️ SDK 模式：MCP Server 只提供结构化 I/O 原语，不做业务决策。
# SKILL.md = 程序，AI = CPU，MCP 工具 = 系统调用。
#
# ⚠️ 结构化调用模板：LLM 必须按 call_template 构造参数，禁止自由推断。
# call_template 是 input 的快捷视图（DRY），若两者冲突以 input 为准。
# ⚠️ output_schema：定义工具返回值的 JSON Schema，供 UI 渲染 ToolCallCard 组件。

tools:
  - name: ritsu_emit_event
    description: 向当月 ctx 文件追加一条结构化事件记录。写入前自动校验是否符合 ctx-event-schema.json。此工具替代 ritsu_write_artifact(type=ctx)，职责更单一——仅处理事件流写入
    call_template:
      tool: ritsu_emit_event
      params:
        event_type: "{started|step_done|step_failed|approval_required|approval_granted|approval_denied|artifact_written|circuit_breaker|done|failed}"
        step: "{N}/{M}"
        correlation_id: "{cid}"
        skill: "{skill_name}"
        domain: "{value}"
      example:
        event_type: "step_done"
        step: "3/7"
        correlation_id: "cid-20260509-001"
        skill: "dev"
        domain: "frontend"
    input:
      event_type:
        type: enum
        values:
          [
            started,
            step_done,
            step_failed,
            approval_required,
            approval_granted,
            approval_denied,
            artifact_written,
            circuit_breaker,
            done,
            failed,
          ]
        required: true
        description: "事件类型（对应 ctx-protocol.md status 枚举）"
      step:
        type: string
        required: false
        description: "步骤进度，格式 N/M（started/step_done/step_failed/approval_*/artifact_written/circuit_breaker/done 时必填，由 Schema if-then 强制）"
      correlation_id:
        type: string
        required: false
        description: "任务链路关联 ID（不提供时自动生成）"
      skill:
        type: string
        required: false
        description: "当前技能名"
      domain:
        type: string
        required: false
        description: "当前领域"
      artifact:
        type: string
        required: false
        description: "产物文件路径（artifact_written 时必填）"
      progress:
        type: string
        required: false
        description: "执行进度标记（如 dev:chunk2/5）"
      error:
        type: string
        required: false
        description: "step_failed/failed/circuit_breaker 时必填"
      approval:
        type: object
        required: false
        description: "approval_* 事件时必填"
      artifact_meta:
        type: object
        required: false
        description: "artifact_written 事件时必填"
      violation:
        type: object
        required: false
        description: "anti-pattern 触发时可选"
      redirect:
        type: string
        required: false
        description: "circuit_breaker 时必填"
      transition:
        type: object
        required: false
        description: "状态机流转事件时可选（含 from/to/event/ui_hint）"
      duration_ms:
        type: integer
        required: false
        description: "step_done/done 时可选"
    validation: "写入前校验事件是否符合 _shared/ctx-event-schema.json 的 if-then 条件"
    concurrency_control: "原子追加锁"
    output_schema:
      type: object
      required: [written, line_count]
      properties:
        written:
          type: boolean
          description: "是否写入成功"
        line_count:
          type: integer
          description: "当前 ctx 文件总行数（写入后）"
        event:
          type: object
          description: "回显写入的完整事件对象"

  - name: ritsu_read_ctx
    description: 读取当月 ctx 文件的状态摘要。返回 last_incomplete（最后未完成任务）、last_completed（最后已完成任务）、recent_entries（最近 10 条）、pending_approvals（待审批事件）
    call_template:
      tool: ritsu_read_ctx
      params: {} # 无参数
    input: {}
    output_schema:
      type: object
      required:
        [last_incomplete, last_completed, recent_entries, pending_approvals]
      properties:
        last_incomplete:
          type: object
          description: "最后一条未完成事件（status=started 且无对应 done/failed）"
          properties:
            correlation_id: { type: string }
            skill: { type: string }
            domain: { type: string }
            step: { type: string }
        last_completed:
          type: object
          description: "最后一条已完成事件（status=done）"
          properties:
            correlation_id: { type: string }
            skill: { type: string }
            domain: { type: string }
            artifact: { type: string }
        recent_entries:
          type: array
          description: "最近 10 条事件"
          items:
            type: object
        pending_approvals:
          type: array
          description: "待审批事件列表"
          items:
            type: object

  - name: ritsu_write_artifact
    description: 写入产物文件到 .ritsu/ 目录。自动拦截含占位符（TODO/待定/暂不处理）的写入（ctx 类型除外）。diagnosis/review-stamp 类型支持 md+html 双格式
    call_template:
      tool: ritsu_write_artifact
      params:
        type: "{handoff|diagnosis|review-stamp|optimize-report}"
        filename: "{文件名}"
        content: "{内容}"
      example:
        type: "handoff"
        filename: "handoff-20260509-auth.md"
        content: "# Handoff..."
    input:
      type:
        type: enum
        values: [handoff, diagnosis, review-stamp, optimize-report]
        required: true
        description: "产物类型"
      filename:
        type: string
        required: true
        description: "文件名（如 handoff-20260509-auth.md）"
      content:
        type: string
        required: true
        description: "文件内容（Markdown 格式）"
      html_content:
        type: string
        required: false
        description: "HTML 格式内容（仅 diagnosis/review-stamp 时可选，自动生成双格式）"
      artifact_meta:
        type: object
        required: false
        description: "产物元数据（type/size_bytes/summary）"
    placeholder_check: "自动检测 TODO/待定/暂不处理 占位符并拒绝写入（ctx 类型豁免）"
    output_schema:
      type: object
      required: [path, size_bytes]
      properties:
        path:
          type: string
          description: "写入文件绝对路径"
        html_path:
          type: string
          description: "HTML 格式文件路径（仅双格式产物）"
        size_bytes:
          type: integer
          description: "文件大小"
        artifact_meta:
          type: object
          description: "产物元数据"

  - name: ritsu_list_artifacts
    description: 列出 .ritsu/ 目录下的产物文件。支持按类型过滤（handoff/diagnosis/review-stamp/optimize-report/ctx）
    call_template:
      tool: ritsu_list_artifacts
      params:
        type: "{类型或all}"
      example:
        type: "handoff"
    input:
      type:
        type: string
        required: false
        description: "产物类型过滤（all/handoff/diagnosis/review-stamp/optimize-report/ctx），默认 all"
    output_schema:
      type: object
      required: [files, total_count]
      properties:
        files:
          type: array
          items:
            type: object
            properties:
              path: { type: string }
              modified: { type: string }
              size_bytes: { type: integer }
              artifact_type: { type: string }
        total_count:
          type: integer

  - name: ritsu_exec
    description: 在项目根目录直接执行命令（不经 shell 解释）并返回结构化输出。只支持单命令执行，不支持管道/重定向/子shell。内置安全边界（白名单二进制 + 危险参数拦截 + shell 元字符阻断）和输出截断。需要管道时请多次调用
    call_template:
      tool: ritsu_exec
      params:
        command: "{命令}"
      example:
        command: "git diff --name-only"
    input:
      command:
        type: string
        required: true
        description: "要执行的命令（单命令，不支持管道/重定向）"
      max_output_lines:
        type: integer
        required: false
        description: "最大输出行数（默认 200）"
      timeout_ms:
        type: integer
        required: false
        description: "超时毫秒数（默认 30000）"
    safety_boundary: "三层防护：shell 元字符阻断（管道/重定向/子shell）+ 白名单二进制 + 危险参数/用法黑名单"
    output_schema:
      type: object
      required: [ok, output]
      properties:
        ok:
          type: boolean
          description: "命令是否成功（exit code 0）"
        output:
          type: string
          description: "命令输出（截断后）"

  - name: ritsu_validate
    description: 独立 Schema 校验工具。校验 JSON 数据是否符合指定 Schema。当前支持 ctx_event 类型
    call_template:
      tool: ritsu_validate
      params:
        data: "{JSON 字符串}"
        schema_type: "ctx_event"
      example:
        data: '{"status":"step_done","step":"3/7","correlation_id":"cid-20260509-001"}'
        schema_type: "ctx_event"
    input:
      data:
        type: string
        required: true
        description: "待校验的 JSON 字符串"
      schema_type:
        type: string
        required: false
        description: "Schema 类型（默认 ctx_event）"
    output_schema:
      type: object
      required: [valid]
      properties:
        valid:
          type: boolean
          description: "是否通过校验"
        errors:
          type: array
          items:
            type: string
          description: "校验错误列表"
