# Anti-Patterns: 全局底线约束 v6.5.0
# 这些规则是不可跨越的底线，无论你当前正在执行哪个技能，都必须无条件遵守。
# 每条规则有唯一 ID，AI 在输出中必须引用 ID 而非模糊描述。
# violation 事件格式见 _shared/ctx-protocol.md violation 字段定义。
#
# examples 字段提供 WRONG/RIGHT 示例，将机器规则升级为团队学习文档。
# story 字段记录该规则被加入的真实触发案例。

global:
  - id: AP-1
    name: Act before reading
    pattern: "执行文件修改或生成方案前，未通过 pwd/package.json 确认环境"
    enforcement: "必须通过 pwd 确认路径，通过读取 package.json/.env 确认真实配置。严禁依赖记忆"
    severity: FATAL
    examples:
      - wrong: "直接修改 src/config.ts 但实际项目在 packages/server/src/config.ts"
        right: "先 pwd → ls → 查看 package.json workspaces 确定目标子包路径"
        story: "AI 在 monorepo 根目录直接创建文件，但运行时找不到路径——未确认工作目录就行动"

  - id: AP-2
    name: Hallucinate paths
    pattern: "引用或调用函数前，未 grep 验证其真实存在"
    enforcement: "引用前必须 grep 验证，禁止制造 Unknown identifiers 导致编译失败"
    severity: FATAL
    detector:
      type: ast
      target: diff
    examples:
      - wrong: "import { parseXML } from './parser' 但 parser.ts 实际只导出了 parseCSV"
        right: "先 grep 'export.*parse' src/parser.ts 确认导出了什么，再写 import"
        story: "AI 假设模块导出名称，导致 ts 编译失败，三次反复才 grep 确认"

  - id: AP-3
    name: Serial interrogation
    pattern: "遇到不清晰的需求，分成多次对话追问"
    enforcement: "必须将所有选项打包在一次回复中抛出"
    severity: FATAL
    examples:
      - wrong: "→ '你用什么数据库？' ← 'PostgreSQL'\n→ 'ORM 呢？' ← 'Prisma'\n→ '表结构有定义了吗？'"
        right: "→ '请提供数据库选型、ORM、表结构定义，一次说清以便给出完整方案'"
        story: "用户反馈一次对话中 AI 连续问了 7 个问题，每个问题只等一次回答"

  - id: AP-4
    name: Scope creep
    pattern: "用户让修 Bug A，顺手重构了旁边的代码 B"
    enforcement: "只触碰范围内的必要代码"
    severity: FATAL
    detector:
      type: scope_diff
      target: diff
    examples:
      - wrong: "修复 IndexOutOfBounds → 同时也重构了相邻循环的变量命名和注释"
        right: "只改越界检查那一行，附带加的注释专门说明为什么加这个边界条件"
        story: "AI 修 bug 时无警告地改动了 14 个文件，PR review 发现其中一半与 bug 无关"

  - id: AP-5
    name: Confidence without evidence
    pattern: "回复'这应该能工作'但不提供任何运行日志"
    enforcement: "必须主动运行验证脚本，并直接抛出运行结果"
    severity: FATAL
    examples:
      - wrong: "'这应该能工作' → 实际上语法错误，TypeError: Cannot read property"
        right: "'运行 node test.js 输出: PASS (3/3)' → 附上实际输出截图"
        story: "AI 声称修复完成但未运行测试；用户运行后发现 3 个语法错误，信任度受损"

  - id: AP-6
    name: Placeholder promises
    pattern: "在交付的代码或设计方案中留下 TODO/TBD/后续实现字样"
    enforcement: "必须一次性完成具体实现或指明阻碍的具体原因"
    exemption: "Schema 0 (AGENTS.md) 的 '待补充' 占位符豁免此规则——init 阶段半成品允许占位，后续技能发现时应提示补充"
    severity: FATAL
    detector:
      type: regex
      target: artifact_content
      patterns:
        - "\\bTODO\\b"
        - "\\bTBD\\b"
        - "待定|暂不处理|后续完善"
      exemption:
        - when: { skill: init, target_file: "AGENTS.md" }
    examples:
      - wrong: "// TODO: add error handling for edge cases"
        right: "try { ... } catch (e) { logger.error(e); return fallbackValue; }"
        story: "AI 生成了包含 12 个 TODO 的代码文件；用户不得不手动逐条跟踪，耗时超过自己重写"

  - id: AP-7
    name: Silent failures
    pattern: "命令执行报错了，假装没看见继续下一步"
    enforcement: "必须停下来，分析报错，或将报错直接反馈给用户"
    severity: FATAL
    detector:
      type: ast_grep
      target: diff
      languages: [typescript, javascript]
      note: "检测空 catch 块和吞没错误的 try/catch。完整 AP-7 执行依赖 AI 遵守。"
    examples:
      - wrong: "npm install 报 404 → 继续写 import 该包的代码"
        right: "npm install 报 404 → 检查包名拼写是否正确 → 搜索正确的包名 → 安装成功后再写 import"
        story: "AI 连续忽略 5 个编译错误继续往下写；用户运行后获得 200 行毫无意义的错误日志"

  - id: AP-8
    name: Unsolicited version bump
    pattern: "未经用户明确要求主动修改 version 字段或生成 CHANGELOG"
    enforcement: "除非用户明确要求发版，否则绝不主动修改"
    severity: WARN
    examples:
      - wrong: "修改代码后将 version: 1.2.0 → 1.3.0 并追加 CHANGELOG 条目"
        right: "只改动业务代码，version 和 CHANGELOG 保持原样"

  - id: AP-9
    name: Attribution leak
    pattern: "在提交的代码、PR 评论或 Issue 回复中加上 Co-authored-by: Claude/AI"
    enforcement: "你的产出归属于用户，绝不带有 AI 机器人的身份痕迹"
    severity: FATAL
    detector:
      type: regex
      target: diff
      patterns:
        - "Co-authored-by:\\s*(Claude|GPT|AI|Anthropic)"
    examples:
      - wrong: "Co-authored-by: Claude <ai@anthropic.com>"
        right: "不添加任何 Co-authored-by 行"

  - id: AP-10
    name: State skip (Critical tasks)
    pattern: "对于 Critical (P2) 级别任务，跳过 think 直接进入 dev。"
    enforcement: "P2 任务必须遵循完整路径。Micro/Standard 级别允许直接路由。"
    severity: ERROR
    examples:
      - wrong: "用户报告生产事故 → AI 直接修代码，未分析根因和影响范围"
        right: "先走 think 分析根因、影响范围、回滚方案 → 确认范围后再 dev"

  - id: AP-11
    name: Domain assumption
    pattern: "未确认领域角色就硬编码前端/后端分支逻辑"
    enforcement: "必须先通过角色探针确认领域，再引用 domains/ 下对应的领域配置"
    severity: FATAL
    examples:
      - wrong: "假设是全栈项目直接写前后端通信代码，实际项目只是纯后端 API"
        right: "先查看 AGENTS.md 中 domain 字段 → 确认是 backend → 只写 API 代码"

  - id: AP-12
    name: Project preference violation
    pattern: "违反了通过 ritsu mine 提炼并 promote 的项目特定偏好"
    enforcement: "必须遵循 .ritsu/preferences.yaml 中定义的项目惯例"
    severity: WARN
    detector:
      type: preference_lint
      target: artifact_content
    examples:
      - wrong: "项目偏好 const over let，但新代码仍然用的 let"
        right: "读取 .ritsu/preferences.yaml → 发现 pref-auto-const → 新代码用 const"

  - id: AP-13
    name: Structural smell (ast-grep)
    pattern: "变更文件含 debugger、空 catch 或调试 console.log"
    enforcement: "交付前对 scan_files 运行 ast-grep 规则集 rules/ast-grep/"
    severity: WARN
    detector:
      type: ast_grep
      target: diff
      rule_dir: rules/ast-grep
      languages: [typescript, javascript]
    examples:
      - wrong: "console.log('debug:', result) 留在提交的代码中"
        right: "确认日志用 logger.info() 而非 console.log，且仅在需要日志时才加"

review:
  - id: R-1
    name: 不明标识符
    pattern: "代码中引入了找不到定义的变量或组件"
    severity: HARD_STOP
    note: "ref AP-2：本条为 review 阶段的 HARD_STOP 特化，只提升严重度与拦截策略，不新增规则语义"
    examples:
      - wrong: "const result = processData(input) 但 processData 未在任何地方定义"
        right: "const result = processData(input) 且 processData 有对应 import 或定义"

  - id: R-2
    name: 版本号不同步
    pattern: "package.json 等多处版本号出现割裂"
    severity: HARD_STOP
    detector:
      type: cross_file
      target: diff
    examples:
      - wrong: "根 package.json version 1.2.0 但 runtime/package.json version 1.3.0"
        right: "两处 version 保持一致，或确认是 monorepo 设计的合理差异"

  - id: R-3
    name: 明文凭证泄露
    pattern: "存在硬编码的 Token、Key、或敏感日志全量打印"
    severity: HARD_STOP
    detector:
      type: regex
      target: diff
      patterns:
        - "(?i)(api_key|token|password)\\s*=\\s*['\"][^'\"]+['\"]"
    examples:
      - wrong: "const API_KEY = 'sk-1234567890abcdef'"
        right: "const API_KEY = process.env.API_KEY"

  - id: R-4
    name: 破坏性契约变更
    pattern: "修改了现有 API/数据格式但不向后兼容，且无双写/迁移方案"
    severity: HARD_STOP
    detector:
      type: contract_drift
      target: diff
    examples:
      - wrong: "将 getUser(id) 签名改为 getUser(id, options) → 所有调用方 break"
        right: "getUser(id, options?) 保留向后兼容 → 或提供迁移脚本 → 或通知所有调用方"

  - id: R-5
    name: 数据迁移不可逆
    pattern: "迁移脚本无法回滚，或没有回滚测试"
    severity: HARD_STOP
    detector:
      type: regex
      target: diff
      patterns:
        - "\\bDROP\\s+(TABLE|COLUMN|INDEX|DATABASE)\\b"
        - "\\bALTER\\s+TABLE\\s+\\w+\\s+DROP\\s+COLUMN\\b"
        - "\\bTRUNCATE\\s+(TABLE\\s+)?\\w+"
    examples:
      - wrong: "ALTER TABLE users DROP COLUMN old_name — 无法恢复数据"
        right: "迁移分三步：ADD COLUMN new_name → 双写 → 确认稳定后 DROP old_name"

  - id: R-6
    name: 安全漏洞引入
    pattern: "新增依赖存在已知 CVE，或代码中存在注入/越权风险"
    severity: HARD_STOP
    detector:
      type: security_smell
      target: diff
    examples:
      - wrong: "npm install package@1.0.0 该版本有已知 RCE 漏洞"
        right: "npm install package@1.2.1 (最新安全版本) 或用 npm audit 确认后再安装"

  - id: R-7
    name: 高风险发布无建议
    pattern: "变更已涉及高发布风险、灰度放量、复杂回滚窗口或跨角色协作，但 assure 未给出 release-advice 或未明确回滚条件"
    severity: HARD_STOP
    examples:
      - wrong: "涉及数据库 schema 变更的发布没有回滚方案"
        right: "发布计划包含：灰度比例、回滚条件、回滚脚本、验证步骤"

  - id: R-8
    name: 架构漂移
    pattern: "新增的跨模块依赖与项目已学习的架构指纹不一致"
    severity: WARN
    detector:
      type: architecture
      target: diff
    examples:
      - wrong: "services/ 模块新 import 了 ui/ 模块 —— 但项目已有的依赖模式全是 services → api → ui"
        right: "新依赖符合已建立的项目模块依赖方向，或经过架构评审确认合理"
      - wrong: "circular dependency: api → services → api"
        right: "提取公共类型到 shared/ 模块，消除循环依赖"

  - id: V-1
    name: Visual fidelity — layout intent mismatch
    pattern: "渲染的 CSS display/layout 与设计意图不一致"
    severity: WARN
    detector:
      type: visual_fidelity
      target: diff
    examples:
      - wrong: "设计使用 flex 布局但渲染使用 block"
        right: "使用 display:flex 匹配设计意图"
      - wrong: "设计使用 grid 布局但渲染使用 flex"
        right: "使用 display:grid 匹配设计意图"

  - id: DA-1
    name: DDD & Clean Architecture Layer Violation
    pattern: "设计稿中声明的模块依赖违反了 Clean Architecture 依赖规则，如 Domain 反向依赖 Infrastructure"
    severity: HARD_STOP
    detector:
      type: design_architecture
      target: artifact_content
    examples:
      - wrong: "design-sheet.md: Domain 层文件 models/user.ts import 了 Infrastructure 层的 database/user-repo.ts"
        right: "Infrastructure 层文件 database/user-repo.ts 实现在 Domain 层定义的 UserRepo 接口，Domain 层不包含任何外部依赖"

  - id: DA-2
    name: Generic Utility Sprawl
    pattern: "提议新建含糊的公共辅助文件（如 utils.ts, helpers.ts）而不是整合至具体的 Domain 服务或模块"
    severity: HARD_STOP
    detector:
      type: design_architecture
      target: artifact_content
    examples:
      - wrong: "提议创建 runtime/src/utils.ts，内含 3 个不同域的辅助函数"
        right: "提议创建 runtime/src/cli/shared.ts（高内聚功能辅助）或复用现有公共模块"

  - id: DA-3
    name: Micro-File Sprawl
    pattern: "设计中提议创建大量零散的极小散列文件（如每个文件仅一个类型或常量）而未进行高内聚聚合"
    severity: HARD_STOP
    detector:
      type: design_architecture
      target: artifact_content
    examples:
      - wrong: "提议创建 5 个独立文件分别只导出一个 TypeScript 接口"
        right: "聚合在 runtime/src/policy/types.ts 中集中导出，提升模块内聚度"

  - id: DA-4
    name: Dead Design Guard
    pattern: "设计稿中提议创建或修改文件，但在 dependency 链路中没有任何调用或消费端依赖"
    severity: HARD_STOP
    detector:
      type: design_architecture
      target: artifact_content
    examples:
      - wrong: "设计中定义了新建 fileA.ts，但 contracts 和 execution_plan 中没有任何模块声明将调用它"
        right: "确保新建的 fileA.ts 被业务逻辑或测试文件引用并有对应 contract 约束"

  - id: DA-5
    name: Algorithmic Complexity Validation
    pattern: "设计中未进行算法和数据结构的性能复杂度分析，或缺少备选算法对比"
    severity: HARD_STOP
    detector:
      type: design_architecture
      target: artifact_content
    examples:
      - wrong: "仅声明'使用列表存储任务并在查找时遍历它'而不提供时间复杂度评估"
        right: "对比‘方案 A (数组查找): O(N)时间’与‘方案 B (Hash Map 索引): O(1)时间’并解释选择 B"

  - id: DA-6
    name: Architectural Option Evaluation
    pattern: "设计中仅提供单一实现路径，缺少备选架构方案对比以及折中决策矩阵 (Trade-off Matrix)"
    severity: HARD_STOP
    detector:
      type: design_architecture
      target: artifact_content
    examples:
      - wrong: "只写了'使用 Polling 从服务端拉取数据'作为唯一方案"
        right: "提供‘备选 1 (HTTP Polling): 实现简单但开销大’与‘备选 2 (WebSocket): 低延迟但需连接管理’的 Pros/Cons 对比矩阵"

  - id: DA-7
    name: MasterGo Design D2C Integration
    pattern: "任务或设计目标中包含 MasterGo 内容，但在设计阶段未生成/编译 `d2c-spec.json`，或设计稿未引入/集成 `d2c-spec.json` 的需求与结构"
    severity: HARD_STOP
    detector:
      type: design_architecture
      target: artifact_content
    examples:
      - wrong: "任务涉及 MasterGo 设计稿还原，但设计阶段未运行 D2C 编译生成 d2c-spec.json"
        right: "运行 mcp__getDesignSections 并通过 ritsu_d2c_compile 产出 d2c-spec.json，并在设计稿中引用集成其规范"

dedup_declaration: "全局底线与 review 红线共同构成完整拦截体系。各技能 HC 通过标注（=AP-N）引用本文件规则，避免重写同一规则。具体执行协议由 SKILL.md 定义，本文件只声明底线"
